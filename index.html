function initFilters() {
  siteData.sections.forEach(section => {
    filters[section.id] = {};
    section.subcategories.forEach(sub => {
      filters[section.id][sub.id] = 'all';
    });
  });
}

/* ========== 渲染导航栏 ========== */
function renderNav() {
  const navInner = document.getElementById('navInner');
  if (!navInner || !siteData) return;

  // 计算总工具数
  let totalTools = 0;
  siteData.sections.forEach(s => { totalTools += s.tools.length; });

  let html = '';

  // 「全部」按钮
  html += `<button class="nav-item${activeSectionId === 'all' ? ' active' : ''}" data-nav="all" onclick="setActiveNav('all')">
    <span class="nav-icon">✨</span>
    <span>全部</span>
    <span class="nav-count">${totalTools}</span>
  </button>`;

  // 各分类按钮
  siteData.sections.forEach(section => {
    const icon = SECTION_ICONS[section.id] || '📂';
    const isActive = activeSectionId === section.id;
    html += `<button class="nav-item${isActive ? ' active' : ''}" data-nav="${section.id}" onclick="setActiveNav('${section.id}')">
      <span class="nav-icon">${icon}</span>
      <span>${section.title}</span>
      <span class="nav-count">${section.tools.length}</span>
    </button>`;
  });

  navInner.innerHTML = html;

  // 滚动到激活项（居中显示）
  setTimeout(() => {
    const activeBtn = navInner.querySelector('.active');
    if (activeBtn) {
      activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
  }, 50);
}

function setActiveNav(sectionId) {
  activeSectionId = sectionId;
  searchQuery = '';
  document.getElementById('searchInput').value = '';

  // 更新导航栏高亮
  const navItems = document.querySelectorAll('.nav-item');
  navItems.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.nav === sectionId);
  });

  renderAll();

  // 如果选择了具体分类，平滑滚动到内容区顶部
  if (sectionId !== 'all') {
    const targetEl = document.getElementById(`section-${sectionId}`);
    if (targetEl) {
      const navBar = document.getElementById('navBar');
      const offset = navBar ? navBar.offsetHeight + 10 : 80;
      window.scrollTo({ top: targetEl.offsetTop - offset, behavior: 'smooth' });
    }
  } else {
    // 全部时滚动到最顶部
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

/* ========== 渲染全部 ========== */
function renderAll() {
  if (!siteData) return;
  const app = document.getElementById('app');
  let html = '';

  siteData.sections.forEach(section => {
    // 导航筛选：如果选中了特定分类，隐藏其他分类
    if (activeSectionId !== 'all' && activeSectionId !== section.id) {
      return;
    }

    // 筛选工具
    let tools = section.tools;

    // 搜索过滤
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      tools = tools.filter(t => {
        const text = (t.title + t.desc + (t.category||'') + (t.grade||'') + (t.tags||[]).join(' ')).toLowerCase();
        return text.includes(q);
      });
    } else {
      // 二级分类过滤
      section.subcategories.forEach(sub => {
        const val = filters[section.id][sub.id];
        if (val !== 'all') {
          const field = sub.id === 'subject' ? 'category' : 'grade';
          tools = tools.filter(t => (t[field]||'') === val);
        }
      });
    }

    // 渲染区块
    html += `<div class="section" id="section-${section.id}">`;
    html += `<h2 class="section-title">${section.title}</h2>`;

    // 二级分类标签（无搜索时显示）
    if (!searchQuery && section.subcategories.length > 0) {
      section.subcategories.forEach(sub => {
        const activeVal = filters[section.id][sub.id];
        html += `<div class="subcat-wrap">`;
        html += `<span class="subcat-label">${sub.title}:</span>`;
        html += `<div class="subcat-tabs" data-section="${section.id}" data-subcat="${sub.id}">`;
        sub.options.forEach(opt => {
          const active = opt.value === activeVal ? ' active' : '';
          const countHtml = opt.count ? `<span class="subcat-count">(${opt.count})</span>` : '';
          html += `<button class="subcat-btn${active}" data-value="${opt.value}" onclick="setFilter('${section.id}','${sub.id}','${opt.value}')">${opt.label}${countHtml}</button>`;
        });
        html += `</div></div>`;
      });
    }

    // 工具列表 / 网格
    const layoutClass = section.layout === 'list' ? 'tool-list' : 'tool-grid';
    html += `<div class="${layoutClass}" id="grid-${section.id}">`;

    if (tools.length === 0) {
      html += `<div class="empty-state">📭 没有匹配的工具</div>`;
    }

    tools.forEach(tool => {
      const isSelf = tool.type === 'self' || !tool.url || tool.url === '#';
      const hasCustomUrl = tool.url && tool.url !== '#' && tool.url.length > 0;
      let url = hasCustomUrl ? tool.url : (isSelf ? `resources/${tool.title}.html` : '#');
      if (url && !url.startsWith('http') && !url.startsWith('/')) url = '/' + url;
      const target = isSelf ? '_blank' : '_blank';
      const cardClass = isSelf ? 'card card--self' : 'card';

      html += `<a href="${url}" target="${target}" class="${cardClass}" data-keywords="${tool.title} ${tool.desc||''} ${tool.category||''} ${tool.grade||''} ${(tool.tags||[]).join(' ')}">`;

      // 角标
      html += `<div class="card-badges">`;
      if (tool.category) {
        html += `<span class="card-badge card-badge--subject">${tool.category}</span>`;
      }
      if (tool.grade) {
        html += `<span class="card-badge card-badge--grade">${tool.grade}</span>`;
      }
      if (isSelf) {
        html += `<span class="card-badge card-badge--self">本地资源</span>`;
      }
      html += `</div>`;

      html += `<div class="card-body">`;
      html += `<div class="card-title">${tool.title}</div>`;
      if (tool.desc) {
        html += `<div class="card-desc">${tool.desc}</div>`;
      }
      html += `</div>`;

      html += `</a>`;
    });

    html += `</div></div>`;
  });

  app.innerHTML = html;
}

/* ========== 筛选逻辑 ========== */
function setFilter(sectionId, subcatId, value) {
  filters[sectionId][subcatId] = value;
  searchQuery = '';
  document.getElementById('searchInput').value = '';

  // 切换二级分类时，自动切换到对应导航分类
  if (activeSectionId === 'all' || activeSectionId !== sectionId) {
    activeSectionId = sectionId;
    // 更新导航高亮
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.nav === sectionId);
    });
  }

  renderAll();
}

function handleSearch() {
  searchQuery = document.getElementById('searchInput').value.trim();
  if (searchQuery) {
    // 搜索时重置所有筛选和导航
    initFilters();
    activeSectionId = 'all';
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.nav === 'all');
    });
  }
  renderAll();
}

/* ========== 键盘快捷操作 ========== */
document.addEventListener('keydown',(e)=>{
  if(e.key==='/' && document.activeElement!==document.getElementById('searchInput')){
    e.preventDefault();document.getElementById('searchInput').focus();
  }
  if(e.key==='Escape'){
    document.getElementById('searchInput').value='';
    searchQuery='';initFilters();
    renderAll();document.getElementById('searchInput').blur();
  }
});

/* ========== 回到顶部 + 滚动监听 ========== */
window.addEventListener('scroll',()=>{
  const btn=document.getElementById('backTop');
  btn.classList.toggle('visible', window.scrollY>400);

  // 滚动时自动更新导航栏高亮（仅当用户没有手动选择分类时）
  if (activeSectionId === 'all' && siteData) {
    const sections = document.querySelectorAll('.section[id^="section-"]');
    const navBar = document.getElementById('navBar');
    const navHeight = navBar ? navBar.offsetHeight : 60;
    let currentId = null;

    sections.forEach(el => {
      const rect = el.getBoundingClientRect();
      if (rect.top <= navHeight + 50 && rect.bottom > navHeight + 100) {
        currentId = el.id.replace('section-', '');
      }
    });

    if (currentId && activeSectionId === 'all') {
      // 只在搜索为空时切换
      if (!searchQuery) {
        const navItems = document.querySelectorAll('.nav-item');
        let changed = false;
        navItems.forEach(btn => {
          const shouldBeActive = btn.dataset.nav === currentId;
          if (shouldBeActive !== btn.classList.contains('active')) {
            changed = true;
          }
        });
      }
    }
  }
}, {passive: true});

/* ========== 启动 ========== */
loadData();
</script>
</body>
</html>
