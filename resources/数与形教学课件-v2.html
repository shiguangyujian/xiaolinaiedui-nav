        &lt;!-- 按钮区：常驻显示，强化 3D 视觉凸显 --&gt;

            &lt;button id=&quot;btn-reset-6&quot; class=&quot;flex-1 py-4 bg-gradient-to-b from-rose-500 to-rose-700 hover:from-rose-400 hover:to-rose-600 text-white font-bold text-xl rounded-xl transition-all active:translate-y-[4px] active:shadow-none shadow-[0_6px_0_0_#9f1239] flex items-center justify-center gap-2 border-b border-white/20&quot; onclick=&quot;resetExploration()&quot;&gt;
              &lt;svg class=&quot;w-6 h-6&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
              重置

            &lt;button id=&quot;btn-explore-6&quot; class=&quot;flex-[2] py-4 bg-gradient-to-b from-emerald-400 to-emerald-600 hover:from-emerald-300 hover:to-emerald-500 disabled:from-slate-600 disabled:to-slate-700 disabled:shadow-none disabled:translate-y-0 text-slate-900 font-bold text-xl rounded-xl transition-all active:translate-y-[4px] active:shadow-none shadow-[0_6px_0_0_#065f46] flex items-center justify-center gap-2 border-b border-white/20&quot; onclick=&quot;exploreNextLayer()&quot;&gt;
              &lt;span id=&quot;btn-text-6&quot;&gt;继续探索下一层&lt;/span&gt;
              &lt;svg id=&quot;btn-icon-6&quot; class=&quot;w-6 h-6 animate-bounce-x&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M13 7l5 5m0 0l-5 5m5-5H6&quot;&gt;&lt;/path&gt;&lt;/svg&gt;

  &lt;script&gt;
    (function() {
      let currentLayer = 0;
      const maxLayers = 8;
      const colors = ['#3b82f6', '#f59e0b', '#10b981', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'];
      
      const container = document.getElementById('square-container-6');
      const formulaList = document.getElementById('formula-list-6');

      function initGrid() {
        container.innerHTML = '';
        for (let i = 0; i &lt; 64; i++) {
          const cell = document.createElement('div');
          cell.className = 'bg-white/5 rounded-[2px] transition-all duration-300';
          cell.id = `cell-${i}`;
          container.appendChild(cell);
        }
      }
      initGrid();

      window.resetExploration = function() {
        currentLayer = 0;
        initGrid();
        formulaList.innerHTML = '';
        document.getElementById('layer-info-6').style.opacity = '0';
        const btn = document.getElementById('btn-explore-6');
        const btnText = document.getElementById('btn-text-6');
        const btnIcon = document.getElementById('btn-icon-6');
        
        btnText.innerText = '继续探索下一层';
        btnIcon.style.display = 'block';
        btn.disabled = false;
      };

      window.exploreNextLayer = function() {
        if (currentLayer &gt;= maxLayers) return;
        
        currentLayer++;
        const info = document.getElementById('layer-info-6');
        const color = colors[(currentLayer - 1) % colors.length];
        
        const newCells = [];
        const targetRow = 7 - (currentLayer - 1);
        const targetCol = currentLayer - 1;

        for (let r = 7; r &gt;= targetRow; r--) {
          newCells.push(r * 8 + targetCol);
        }
        for (let c = 0; c &lt; targetCol; c++) {
          newCells.push(targetRow * 8 + c);
        }

        newCells.forEach((index, i) =&gt; {
          const cell = document.getElementById(`cell-${index}`);
          if (cell) {
            setTimeout(() =&gt; {
              cell.style.backgroundColor = color;
              cell.style.boxShadow = `0 0 10px ${color}88`;
              cell.classList.add('scale-110');
              setTimeout(() =&gt; cell.classList.remove('scale-110'), 200);
            }, i * 40);
          }
        });

        setTimeout(() =&gt; {
          info.style.opacity = '1';
          document.getElementById('layer-num-6').innerText = currentLayer;
          document.getElementById('layer-add-6').innerText = 2 * currentLayer - 1;
          
          let terms = [];
          for (let i = 1; i &lt;= currentLayer; i++) terms.push(2 * i - 1);
          const step = document.createElement('div');
          step.className = 'animate-slideIn py-2 border-b border-white/5 last:border-0';
          
          // 动态调整字体大小
          let fontSizeClass = currentLayer &gt; 6 ? 'text-lg' : 'text-xl';
          step.innerHTML = `&lt;div class=&quot;${fontSizeClass}&quot;&gt;\\(${terms.join(' + ')} = ${currentLayer}^2 = ${currentLayer * currentLayer}\\)&lt;/div&gt;`;
          formulaList.appendChild(step);
          
          formulaList.scrollTo({ top: formulaList.scrollHeight, behavior: 'smooth' });
          if (window.MathJax) MathJax.typesetPromise([step]);
        }, newCells.length * 40);

        if (currentLayer &gt;= maxLayers) {
          const btn = document.getElementById('btn-explore-6');
          const btnText = document.getElementById('btn-text-6');
          const btnIcon = document.getElementById('btn-icon-6');
          btnText.innerText = '已探索至 8&times;8';
          btnIcon.style.display = 'none';
          btn.disabled = true;
        }
      };
      
      setTimeout(exploreNextLayer, 500);
    })();
  &lt;/script&gt;

  &lt;style&gt;
    @keyframes slideIn {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .animate-slideIn { animation: slideIn 0.4s ease-out forwards; }
    
    @keyframes bounce-x {

    &lt;h2 class=&quot;title-main&quot;&gt;规律验证：动态生成器&lt;/h2&gt;
    &lt;div class=&quot;grid grid-cols-3 gap-8 mt-4&quot;&gt;

        &lt;div id=&quot;result-stats&quot; class=&quot;mt-8 space-y-4 opacity-0 transition-opacity&quot;&gt;
          &lt;div class=&quot;p-3 bg-white/10 rounded-lg border border-white/10&quot;&gt;
            &lt;span class=&quot;text-[#A8C8AF]&quot;&gt;加数个数 (n)：&lt;/span&gt;
            &lt;span id=&quot;stat-n&quot; class=&quot;font-bold text-[#C8A85D] text-xl&quot;&gt;0&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;p-3 bg-white/10 rounded-lg border border-white/10&quot;&gt;
            &lt;span class=&quot;text-[#A8C8AF]&quot;&gt;最后一个奇数：&lt;/span&gt;
            &lt;span id=&quot;stat-last&quot; class=&quot;font-bold text-[#C8A85D] text-xl&quot;&gt;0&lt;/span&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;col-span-2 flex flex-col items-center justify-center bg-white/5 rounded-2xl shadow-inner p-8 relative overflow-hidden border border-white/10&quot;&gt;
        &lt;!-- 方阵展示区：使用 Grid 布局确保正方形形态 --&gt;
        &lt;div id=&quot;grid-display-8&quot; class=&quot;grid gap-1 bg-white/5 p-2 rounded-lg transition-all duration-500&quot; style=&quot;width: 320px; height: 320px;&quot;&gt;
          &lt;!-- 动态生成的格子 --&gt;
        &lt;/div&gt;
        &lt;div id=&quot;formula-display&quot; class=&quot;mt-8 text-3xl font-bold text-[#C8A85D] min-h-[3rem] text-center w-full px-4 break-all leading-tight&quot;&gt;
          &lt;!-- 算式显示 --&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
  &lt;script&gt;
    function generateSquare() {
      const n = parseInt(document.getElementById('n-input').value);
      if(isNaN(n) || n &lt; 1 || n &gt; 10) return;
      
      const grid = document.getElementById('grid-display-8');
      const formula = document.getElementById('formula-display');
      const stats = document.getElementById('result-stats');
      
      // 更新统计数据
      document.getElementById('stat-n').innerText = n;
      document.getElementById('stat-last').innerText = 2 * n - 1;
      stats.style.opacity = '1';
      
      // 动态调整算式字体大小，防止溢出
      // n=1~5: 1.875rem (3xl), n=6~8: 1.5rem (2xl), n=9~10: 1.25rem (xl)
      if (n &lt;= 5) {
        formula.style.fontSize = '1.875rem';
      } else if (n &lt;= 8) {
        formula.style.fontSize = '1.5rem';
      } else {
        formula.style.fontSize = '1.25rem';
      }
      
      // 初始化网格布局
      grid.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
      grid.style.gridTemplateRows = `repeat(${n}, 1fr)`;
      grid.innerHTML = '';
      
      const colors = ['#3b82f6', '#f59e0b', '#10b981', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#6366f1', '#14b8a6'];
      
      // 按照&ldquo;层&rdquo;的概念生成格子，模拟 L 形扩展
      for(let layer = 1; layer &lt;= n; layer++) {
        const color = colors[(layer-1) % colors.length];
        const layerCells = [];
        
        // 确定当前层（L形）的所有格子坐标
        // 坐标系：(row, col)，从左下角 (n-1, 0) 开始
        const targetRow = (n - 1) - (layer - 1);
        const targetCol = layer - 1;

        // 竖向部分
        for (let r = n - 1; r &gt;= targetRow; r--) {
          layerCells.push({r, c: targetCol});
        }
        // 横向部分
        for (let c = 0; c &lt; targetCol; c++) {
          layerCells.push({r: targetRow, c});
        }

        // 动画展示每一层
        layerCells.forEach((pos, i) =&gt; {
          const cell = document.createElement('div');
          cell.className = 'w-full h-full rounded-sm opacity-0 transform scale-50 transition-all duration-300';
          cell.style.backgroundColor = color;
          cell.style.gridColumnStart = pos.c + 1;
          cell.style.gridRowStart = pos.r + 1;
          grid.appendChild(cell);

          setTimeout(() =&gt; {
            cell.style.opacity = '1';
            cell.style.transform = 'scale(1)';
          }, (layer - 1) * 400 + i * 50);
        });
      }
      
      // 更新算式
      let terms = [];
      for(let i = 1; i &lt;= n; i++) terms.push(2 * i - 1);
      formula.innerHTML = `\\(${terms.join(' + ')} = ${n}^2 = ${n*n}\\)`;
      if(window.MathJax) MathJax.typesetPromise([formula]);
    }
    
    // 页面加载后默认生成一个 5x5
    setTimeout(generateSquare, 500);
  &lt;/script&gt;

&lt;template class=&quot;page-data&quot; data-id=&quot;11&quot; data-name=&quot;变式应用&quot;&gt;


  &lt;div class=&quot;page-container&quot;&gt;
    &lt;h2 class=&quot;title-main&quot;&gt;第三关：终极挑战&lt;/h2&gt;
    &lt;div class=&quot;card mt-8&quot;&gt;
      &lt;div class=&quot;text-2xl font-bold text-white mb-8&quot;&gt;
        计算：\(1 + 3 + 5 + 7 + 5 + 3 + 1 = ?\)
      &lt;/div&gt;
      &lt;div class=&quot;grid grid-cols-2 gap-12 items-center&quot;&gt;
        &lt;div class=&quot;relative w-64 h-64 mx-auto bg-white/5 rounded-lg p-4 flex items-center justify-center overflow-hidden&quot;&gt;
          &lt;div id=&quot;pyramid-grid&quot; class=&quot;grid grid-cols-4 grid-rows-4 gap-1 w-48 h-48&quot;&gt;
            &lt;!-- 16个格子，初始为底色 --&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;space-y-6&quot;&gt;
          &lt;p class=&quot;text-lg text-[#A8C8AF]&quot;&gt;💡 巧妙拆解：&lt;/p&gt;
          &lt;div id=&quot;part-up&quot; class=&quot;p-4 bg-white/10 rounded-lg border border-white/10 transition-all duration-500&quot;&gt;
            &lt;span class=&quot;text-[#C8A85D] font-bold&quot;&gt;上升部分：&lt;/span&gt;&lt;br&gt;
            &lt;span id=&quot;formula-up&quot;&gt;\(1+3+5+7 = 4^2 = 16\)&lt;/span&gt;
          &lt;/div&gt;
          &lt;div id=&quot;part-down&quot; class=&quot;p-4 bg-white/10 rounded-lg border border-white/10 transition-all duration-500&quot;&gt;
            &lt;span class=&quot;text-[#A8C8AF] font-bold&quot;&gt;下降部分：&lt;/span&gt;&lt;br&gt;
            &lt;span id=&quot;formula-down&quot;&gt;\(5+3+1 = 3^2 = 9\)&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;flex gap-4&quot;&gt;
            &lt;button class=&quot;btn-primary flex-1&quot; onclick=&quot;animatePyramidSplit()&quot;&gt;点击拆解演示&lt;/button&gt;
            &lt;button class=&quot;px-4 py-2 rounded-full border border-white/20 text-sm text-white&quot; onclick=&quot;resetPyramid()&quot;&gt;重置&lt;/button&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div id=&quot;final-ans-14&quot; class=&quot;mt-8 text-4xl font-bold text-center text-[#C8A85D] opacity-0 transition-all&quot;&gt;
        \(16 + 9 = 25\)
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
  &lt;script&gt;
    function initPyramid() {
      const grid = document.getElementById('pyramid-grid');
      if(!grid) return;
      grid.innerHTML = '';
      for(let i=0; i&lt;16; i++) {
        const tile = document.createElement('div');
        tile.className = 'w-full h-full bg-white/10 rounded-sm transition-all duration-500';
        tile.id = 'p-tile-' + i;
        grid.appendChild(tile);
      }
    }

    function animatePyramidSplit() {
      const tiles = document.querySelectorAll('[id^=&quot;p-tile-&quot;]');
      const upBox = document.getElementById('part-up');
      const downBox = document.getElementById('part-down');
      const finalAns = document.getElementById('final-ans-14');
      
      // 1. 上升部分：16个格子变金色 (4x4)
      tiles.forEach((tile, i) =&gt; {
        setTimeout(() =&gt; {
          tile.style.background = '#C8A85D';
          tile.style.transform = 'scale(1)';
        }, i * 50);
      });

      // 2. 延迟后，拆解出下降部分 (3x3 = 9个)
      setTimeout(() =&gt; {
        upBox.style.transform = 'translateX(-10px)';
        upBox.style.borderColor = '#C8A85D';
        
        // 选取右下角的 3x3 区域进行&ldquo;分离&rdquo;
        // 索引：5,6,7, 9,10,11, 13,14,15
        const downIndices = [5,6,7, 9,10,11, 13,14,15];
        downIndices.forEach((idx, i) =&gt; {
          const tile = document.getElementById('p-tile-' + idx);
          if(tile) {
            setTimeout(() =&gt; {
              tile.style.background = '#A8C8AF';
              tile.style.transform = 'translate(15px, 15px) scale(0.9)';
            }, i * 50);
          }
        });
        
        downBox.style.transform = 'translateX(10px)';
        downBox.style.borderColor = '#A8C8AF';
        finalAns.style.opacity = '1';
      }, 1200);
    }

    function resetPyramid() {
      document.getElementById('part-up').style.transform = '';
      document.getElementById('part-up').style.borderColor = '';
      document.getElementById('part-down').style.transform = '';
      document.getElementById('part-down').style.borderColor = '';
      document.getElementById('final-ans-14').style.opacity = '0';
      initPyramid();
    }
    
    // 初始化
    setTimeout(initPyramid, 100);
  &lt;/script&gt;


&lt;/template&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
