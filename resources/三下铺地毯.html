<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>铺地毯</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            font-family: sans-serif;
            overflow: hidden;
            touch-action: none;
            position: relative;
        }

        .svg-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            display: block;
        }

        .static {
            fill: #ffffff;
            stroke: #333333;
            stroke-width: 2;
            stroke-linejoin: round;
        }

        .grey-face {
            fill: #f0f0f0;
            stroke: #bbbbbb;
            stroke-width: 1.5;
            stroke-linejoin: round;
        }

        .interactive {
            cursor: grab;
            stroke: #333333;
            stroke-width: 2;
            stroke-linejoin: round;
            -webkit-tap-highlight-color: transparent;
            transform: translate(var(--tx, 0px), var(--ty, 0px));
        }

        .interactive:active {
            cursor: grabbing;
        }

        .h-face {
            fill: #bae0ff;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .h-face:hover {
            fill: #99ccff;
        }

        .v-face {
            fill: #ffd6e7;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .v-face:hover {
            fill: #f5b7bd;
        }

        .dimension-line {
            stroke: #555555;
            stroke-width: 1.5;
        }

        .dimension-text {
            font-family: '楷体', 'KaiTi', 'STKaiti', serif;
            font-size: 26px;
            fill: #333333;
            user-select: none;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        .hint {
            color: #aaaaaa;
            font-size: 16px;
            margin: 0;
            user-select: none;
        }
    </style>
</head>

<body>

    <div class="svg-container">
        <svg viewBox="0 0 850 600" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <marker id="arrow-start" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="6" markerHeight="6"
                    orient="auto">
                    <path d="M 10 1 L 0 5 L 10 9 z" fill="#555555" />
                </marker>
                <marker id="arrow-end" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6"
                    orient="auto">
                    <path d="M 0 1 L 10 5 L 0 9 z" fill="#555555" />
                </marker>
            </defs>

            <!-- 1. 底座主体 -->
            <g id="staircase-base">
                <polygon class="static"
                    points="200,450 560,450 560,410 500,410 500,370 440,370 440,330 380,330 380,290 320,290 320,250 260,250 260,210 200,210" />
            </g>

            <!-- 2. 保留原位置的淡灰色平行四边形 -->
            <g id="staircase-grey"></g>

            <!-- 3. 尺寸标注和辅助线 -->
            <g id="dimensions">
                <!-- 底部 3米 -->
                <line x1="200" y1="450" x2="200" y2="500" class="dimension-line" />
                <line x1="560" y1="450" x2="560" y2="500" class="dimension-line" />
                <line x1="200" y1="485" x2="330" y2="485" class="dimension-line" marker-start="url(#arrow-start)" />
                <line x1="430" y1="485" x2="560" y2="485" class="dimension-line" marker-end="url(#arrow-end)" />
                <text x="380" y="493" text-anchor="middle" class="dimension-text">3米</text>

                <!-- 左侧 2米 -->
                <line x1="200" y1="450" x2="140" y2="450" class="dimension-line" />
                <line x1="200" y1="210" x2="140" y2="210" class="dimension-line" />
                <line x1="155" y1="450" x2="155" y2="370" class="dimension-line" marker-start="url(#arrow-start)" />
                <line x1="155" y1="290" x2="155" y2="210" class="dimension-line" marker-end="url(#arrow-end)" />
                <text x="145" y="330" text-anchor="middle" class="dimension-text"
                    transform="rotate(-90 145,330)">2米</text>

                <!-- 斜侧 2米 -->
                <line x1="200" y1="210" x2="160" y2="160" class="dimension-line" />
                <line x1="320" y1="120" x2="280" y2="70" class="dimension-line" />
                <line x1="180" y1="185" x2="216" y2="158" class="dimension-line" marker-start="url(#arrow-start)" />
                <line x1="264" y1="122" x2="300" y2="95" class="dimension-line" marker-end="url(#arrow-end)" />
                <text x="240" y="132" text-anchor="middle" class="dimension-text"
                    transform="rotate(-36.87 240,132)">2米</text>
            </g>

            <!-- 4. 可以交互平移的彩色面 -->
            <g id="staircase-interactive"></g>
        </svg>
    </div>

    <div class="footer">
        <p class="hint">提示：点击或拖拽各个面</p>
    </div>

    <script>
        const svg = document.querySelector('svg');
        const staircaseGrey = document.getElementById('staircase-grey');
        const staircaseInteractive = document.getElementById('staircase-interactive');

        const steps = 6;
        const startX = 200;
        const startY = 210;
        const treadW = 60;
        const riserH = 40;
        const dx = 120;
        const dy = -90;

        // 生成平行四边形面
        for (let i = 0; i < steps; i++) {
            // H-face (水平台阶)
            let hx = startX + i * treadW;
            let hy = startY + i * riserH;
            let hPoints = `${hx},${hy} ${hx + treadW},${hy} ${hx + treadW + dx},${hy + dy} ${hx + dx},${hy + dy}`;

            // V-face (竖直台阶)
            let vx = startX + (i + 1) * treadW;
            let vy = startY + i * riserH;
            let vPoints = `${vx},${vy} ${vx},${vy + riserH} ${vx + dx},${vy + riserH + dy} ${vx + dx},${vy + dy}`;

            // 1. 生成保留在原位的灰色底面
            let greyH = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            greyH.setAttribute('points', hPoints);
            greyH.setAttribute('class', 'grey-face');
            staircaseGrey.appendChild(greyH);

            let greyV = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            greyV.setAttribute('points', vPoints);
            greyV.setAttribute('class', 'grey-face');
            staircaseGrey.appendChild(greyV);

            // 2. 生成位于顶层的可交互面
            let hPoly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            hPoly.setAttribute('points', hPoints);
            hPoly.setAttribute('class', 'h-face interactive');
            hPoly.dataset.targetTx = 0;
            hPoly.dataset.targetTy = -i * riserH;
            hPoly.style.setProperty('--tx', '0px');
            hPoly.style.setProperty('--ty', '0px');
            staircaseInteractive.appendChild(hPoly);

            let vPoly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            vPoly.setAttribute('points', vPoints);
            vPoly.setAttribute('class', 'v-face interactive');
            vPoly.dataset.targetTx = (steps - i - 1) * treadW;
            vPoly.dataset.targetTy = 0;
            vPoly.style.setProperty('--tx', '0px');
            vPoly.style.setProperty('--ty', '0px');
            staircaseInteractive.appendChild(vPoly);
        }

        // 拖拽逻辑
        let dragTarget = null;
        let startX_pt = 0;
        let startY_pt = 0;
        let initTx = 0;
        let initTy = 0;
        let isDragging = false;
        let hasMoved = false;

        function getMousePosition(evt) {
            var CTM = svg.getScreenCTM();
            if (evt.touches && evt.touches.length > 0) {
                evt = evt.touches[0];
            }
            return {
                x: (evt.clientX - CTM.e) / CTM.a,
                y: (evt.clientY - CTM.f) / CTM.d
            };
        }

        function startDrag(evt) {
            if (evt.target.classList.contains('interactive')) {
                evt.preventDefault();
                dragTarget = evt.target;
                dragTarget.parentNode.appendChild(dragTarget); // 移到最前

                dragTarget.style.transition = 'none'; // 拖拽时取消动画，跟随手指

                let pt = getMousePosition(evt);
                startX_pt = pt.x;
                startY_pt = pt.y;

                initTx = parseFloat(dragTarget.style.getPropertyValue('--tx')) || 0;
                initTy = parseFloat(dragTarget.style.getPropertyValue('--ty')) || 0;

                isDragging = true;
                hasMoved = false;
            }
        }

        function drag(evt) {
            if (isDragging && dragTarget) {
                evt.preventDefault();
                let pt = getMousePosition(evt);
                let dx_pt = pt.x - startX_pt;
                let dy_pt = pt.y - startY_pt;

                // 设置一个小阈值判断是否真正发生了移动
                if (Math.abs(dx_pt) > 3 || Math.abs(dy_pt) > 3) {
                    hasMoved = true;
                }

                let isH = dragTarget.classList.contains('h-face');

                if (isH) {
                    let newTy = initTy + dy_pt;
                    let targetTy = parseFloat(dragTarget.dataset.targetTy);
                    // 限制只能在原点和目标点之间垂直移动
                    if (targetTy < 0) {
                        if (newTy > 0) newTy = 0;
                        if (newTy < targetTy) newTy = targetTy;
                    } else {
                        newTy = 0;
                    }
                    dragTarget.style.setProperty('--tx', '0px');
                    dragTarget.style.setProperty('--ty', `${newTy}px`);
                } else {
                    let newTx = initTx + dx_pt;
                    let targetTx = parseFloat(dragTarget.dataset.targetTx);
                    // 限制只能在原点和目标点之间水平移动
                    if (targetTx > 0) {
                        if (newTx < 0) newTx = 0;
                        if (newTx > targetTx) newTx = targetTx;
                    } else {
                        newTx = 0;
                    }
                    dragTarget.style.setProperty('--tx', `${newTx}px`);
                    dragTarget.style.setProperty('--ty', '0px');
                }
            }
        }

        function endDrag(evt) {
            if (isDragging && dragTarget) {
                isDragging = false;
                // 恢复 CSS 动画，用于自动吸附的过程动画
                dragTarget.style.transition = '';

                let isH = dragTarget.classList.contains('h-face');
                let currentTx = parseFloat(dragTarget.style.getPropertyValue('--tx')) || 0;
                let currentTy = parseFloat(dragTarget.style.getPropertyValue('--ty')) || 0;
                let targetTx = parseFloat(dragTarget.dataset.targetTx);
                let targetTy = parseFloat(dragTarget.dataset.targetTy);

                if (!hasMoved) {
                    // 如果是点击没有移动，直接切换吸附端点
                    let isAtTarget = isH ? (Math.abs(currentTy - targetTy) < 1) : (Math.abs(currentTx - targetTx) < 1);

                    if (isAtTarget) {
                        dragTarget.style.setProperty('--tx', '0px');
                        dragTarget.style.setProperty('--ty', '0px');
                    } else {
                        dragTarget.style.setProperty('--tx', `${targetTx}px`);
                        dragTarget.style.setProperty('--ty', `${targetTy}px`);
                    }
                } else {
                    // 如果是拖拽后松手，自动吸附到距离最近的端点
                    if (isH) {
                        if (Math.abs(currentTy) < Math.abs(currentTy - targetTy)) {
                            dragTarget.style.setProperty('--ty', '0px');
                        } else {
                            dragTarget.style.setProperty('--ty', `${targetTy}px`);
                        }
                    } else {
                        if (Math.abs(currentTx) < Math.abs(currentTx - targetTx)) {
                            dragTarget.style.setProperty('--tx', '0px');
                        } else {
                            dragTarget.style.setProperty('--tx', `${targetTx}px`);
                        }
                    }
                }
                dragTarget = null;
            }
        }

        // 支持鼠标和触摸屏统一使用 Pointer Event
        svg.addEventListener('pointerdown', startDrag);
        window.addEventListener('pointermove', drag, { passive: false });
        window.addEventListener('pointerup', endDrag);
        window.addEventListener('pointercancel', endDrag);
    </script>

</body>

</html>
