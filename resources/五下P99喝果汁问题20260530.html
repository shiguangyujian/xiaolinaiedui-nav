<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小乐的喝果汁问题</title>


    <style>
        /* === 核心变量定义与高级色彩系统 === */
        :root {
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #d6d6d6 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 0.6);
            --card-shadow: 0 10px 25px -5px rgba(148, 163, 184, 0.1), 0 8px 10px -6px rgba(148, 163, 184, 0.05);
            --card-shadow-hover: 0 20px 30px -5px rgba(148, 163, 184, 0.2), 0 10px 15px -5px rgba(148, 163, 184, 0.1);

            --step1-primary: #ea580c;
            --step1-bg: #ffedd5;
            --step1-border: #fed7aa;

            --step2-primary: #2563eb;
            --step2-bg: #dbeafe;
            --step2-border: #bfdbfe;

            --step3-primary: #9333ea;
            --step3-bg: #f3e8ff;
            --step3-border: #d8b4fe;

            --step4-primary: #dc2626;
            --step4-bg: #fee2e2;
            --step4-border: #fca5a5;
        }

        /* === 基础复位与全局高亮去除 === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            /* 去除点击出现的大矩形高亮 */
            outline: none;
            /* 去除选中边框 */
        }

        /* 强制一屏幕显示，禁止全局滚动 */
        html,
        body {
            height: 100vh;
            overflow: hidden;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-gradient);
            color: #1e293b;
            padding: 0.75rem 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            user-select: none;
            -webkit-user-select: none;
        }

        /* === 页面顶部 === */
        header {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            margin-bottom: 0.5rem;
            flex: 0 0 auto;
            gap: 1rem;
        }

        .gradient-title {
            background: linear-gradient(135deg, #ea580c 0%, #00a2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            white-space: nowrap;
        }

        #global-hint {
            text-align: center;
            font-size: 0.9rem;
            color: #ea580c;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(226, 232, 240, 0.9);
            padding: 0.4rem 1.25rem;
            border-radius: 9999px;
            box-shadow: 0 4px 12px rgba(148, 163, 184, 0.1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .header-btns {
            display: flex;
            gap: 0.5rem;
            justify-self: end;
        }

        .top-btn {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid #cbd5e1;
            padding: 0.35rem 1.25rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .top-btn:hover {
            background: white;
            color: #2563eb;
            border-color: #3b82f6;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transform: translateY(-1px);
        }

        /* === 横向滚动卡片容器结构 === */
        .slider-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            padding: 0 3.5rem;
            /* 留出左右悬浮箭头的空间 */
            flex: 1;
            /* 占据剩余可用高度 */
            min-height: 0;
            /* 防止溢出 */
            margin-bottom: 0.5rem;
        }

        .slider-viewport {
            width: 100%;
            height: 100%;
            overflow-x: auto;
            scroll-behavior: smooth;
            display: flex;
            align-items: center;
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        .slider-viewport::-webkit-scrollbar {
            display: none;
            /* Safari and Chrome */
        }

        .slider-track {
            display: flex;
            gap: 1.25rem;
            width: 100%;
            height: 100%;
            padding: 0.5rem 0;
        }

        /* === 步骤卡片样式 === */
        .step-card {
            flex: 0 0 calc(33.333% - 0.84rem);
            /* 默认桌面端显示 3 个卡片 */
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            padding: 1.25rem;
            box-shadow: var(--card-shadow);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100%;
            /* 占满 slider 轨道高度 */
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        @media (max-width: 1023px) and (min-width: 768px) {
            .step-card {
                flex: 0 0 calc(50% - 0.63rem);
                /* 平板端显示 2 个卡片 */
            }
        }

        @media (max-width: 767px) {
            .step-card {
                flex: 0 0 100%;
                /* 移动端显示 1 个卡片 */
            }
        }

        /* === 折叠卡片状态 === */
        .step-card.collapsed {
            background: rgba(255, 255, 255, 0.45);
            border: 2px dashed rgba(148, 163, 184, 0.35);
            box-shadow: none;
            justify-content: center;
            cursor: pointer;
        }

        .step-card.fill-card {
            background-color: #f0f8ff;
        }

        .step-card.collapsed:hover {
            background: rgba(255, 255, 255, 0.65);
            border-color: rgba(148, 163, 184, 0.6);
            transform: translateY(-2px);
        }

        .step-card.collapsed .step-badge {
            transform: scale(1.2);
            margin-bottom: 0;
            animation: pulse 2s infinite;
        }

        /* 引导性虚线提示 */
        .step-card.collapsed::after {
            content: "点击卡片展开步骤";
            font-size: 0.8rem;
            font-weight: 700;
            color: #64748b;
            margin-top: 0.85rem;
            opacity: 0.7;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.25);
            }

            70% {
                box-shadow: 0 0 0 8px rgba(37, 99, 235, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(37, 99, 235, 0);
            }
        }

        /* 折叠状态下隐藏内容 */
        .step-card.collapsed .step-action,
        .step-card.collapsed .cup-wrapper,
        .step-card.collapsed .questions-container {
            opacity: 0;
            pointer-events: none;
            height: 0;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* 展开动画 */
        .step-action,
        .cup-wrapper,
        .questions-container {
            width: 100%;
            opacity: 1;
            transition: opacity 0.3s ease, height 0.3s ease, margin 0.3s ease, padding 0.3s ease;
            height: 150px;
        }

        /* 顶部步骤徽章 */
        .step-badge {
            font-size: 0.85rem;
            font-weight: 800;
            padding: 0.25rem 0.85rem;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
            border: 1px solid transparent;
            transition: all 0.3s;
        }

        /* 各卡片色彩主题 */
        .step-badge.badge-drink {
            background: #ffedd5;
            color: #ea580c;
            border-color: #fed7aa;
        }

        .step-badge.badge-fill {
            background: #dbeafe;
            color: #2563eb;
            border-color: #bfdbfe;
        }

        .step-action {
            height: 50px;
            font-size: 2.25rem;
            color: #0f172a;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        /* 眼睛按钮交互样式 */
        .eye-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.25rem;
            border-radius: 6px;
            transition: all 0.2s;
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .eye-btn.visible {
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
        }

        .eye-btn:hover {
            color: #2563eb;
            background: rgba(37, 99, 235, 0.08);
            transform: scale(1.08);
        }

        .eye-btn.active {
            color: #2563eb;
            background: rgba(37, 99, 235, 0.15);
        }

        .eye-icon {
            width: 1.35rem;
            height: 1.35rem;
            display: block;
        }

        /* 眼睛图标的 SVG 属性强化显现 */
        .eye-btn svg {
            stroke: currentColor;
            stroke-width: 2px;
            fill: none;
        }

        .eye-btn.active svg {
            stroke: #2563eb;
        }

        /* === 虚拟杯子及玻璃遮罩（自适应大小） === */
        .cup-wrapper {
            position: relative;
            flex: 1;
            /* 弹性高度自适应 */
            min-height: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 0.5rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        .cup-wrapper svg {
            width: auto;
            height: 100%;
            max-height: 100%;
            max-width: 100%;
        }

        .liquid-rect {
            transition: fill 0.1s ease, opacity 0.1s ease;
        }

        .liquid-label {
            transition: opacity 0.1s ease;
        }

        .liquid-label-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            width: 100%;
            height: 100%;
            white-space: nowrap;
        }

        [data-step="4"] .liquid-label-inner {
            font-size: 1rem;
        }

        .quarter-lines {
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        /* === 问题与点击回答区域 === */
        .questions-container {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            border-top: 1px dashed #cbd5e1;
            padding-top: 0.5rem;
            margin-top: auto;
        }

        .question-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            font-size: 1.5rem;
        }

        .question-row.question-juice {
            color: #ff7f50;
        }

        .question-row.question-water {
            color: #00a2ff;
        }

        .question-juice .answer-badge {
            color: #ff7f50;
            background: #fff5f2;
        }

        .question-juice .answer-badge:hover {
            background: #ffe3d9;
            color: #e05319;
        }

        .question-juice .answer-badge.revealed {
            background: #fff5f2;
            color: #ff7f50;
            border: 1.5px solid #ffccb8;
            box-shadow: 0 4px 6px -1px rgba(255, 127, 80, 0.15);
        }

        .question-water .answer-badge {
            color: #00a2ff;
            background: #f0f9ff;
        }

        .question-water .answer-badge:hover {
            background: #dbeffe;
            color: #0084d1;
        }

        .question-water .answer-badge.revealed {
            background: #f0f9ff;
            color: #00a2ff;
            border: 1.5px solid #bde3ff;
            box-shadow: 0 4px 6px -1px rgba(0, 162, 255, 0.15);
        }

        .question-label {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot-juice {
            background: #ff7f50;
        }

        .dot-water {
            background: #00a2ff;
        }

        .answer-badge {
            background: #f1f5f9;
            color: #64748b;
            border: none;
            width: 100px;
            height: 64px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.04), 0 2px 4px rgba(0, 0, 0, 0.02);
            -webkit-tap-highlight-color: transparent;
        }

        .answer-badge:hover {
            background: #e2e8f0;
            color: #1e293b;
            transform: scale(1.1);
        }

        .answer-badge.revealed {
            background: #eff6ff;
            color: #2563eb;
            width: auto;
            height: 64px;
            padding: 0 0.85rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.1);
            border: 1.5px solid #bfdbfe;
            font-family: inherit;
            font-size: 2rem;
            animation: bounceIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .fraction-box {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            line-height: 1;
            margin: 0 0.5rem;
        }

        .fraction-num {
            border-bottom: 1.5px solid currentColor;
            padding-bottom: 1px;
            font-size: 0.85em;
        }

        .fraction-denom {
            font-size: 0.85em;
            padding-top: 1px;
        }

        /* === 重选按钮 === */
        .reselect-btn {
            position: absolute;
            right: 1rem;
            background: #f1f5f9;
            color: #64748b;
            border: 1px solid #cbd5e1;
            padding: 0.25rem 0.85rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }

        .reselect-btn:hover {
            background: #e2e8f0;
            color: #334155;
            border-color: #94a3b8;
        }

        /* === 悬浮横向滚动切换按钮 === */
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 30;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #cbd5e1;
            border-radius: 50%;
            width: 3rem;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            color: #334155;
            -webkit-tap-highlight-color: transparent;
        }

        .slider-btn:hover:not(:disabled) {
            background: white;
            color: #2563eb;
            transform: translateY(-50%) scale(1.08);
            box-shadow: 0 6px 15px rgba(37, 99, 235, 0.15);
        }

        .slider-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            box-shadow: none;
        }

        .slider-btn.left {
            left: 0;
        }

        .slider-btn.right {
            right: 0;
        }

        /* === 提示文本样式 === */
        #drag-hint-2.visible,
        #drag-hint-3.visible {
            opacity: 1 !important;
            height: auto !important;
            margin-top: 0.25rem;
        }

        /* === 右侧隐藏点击区域样式 === */
        .side-click-area {
            opacity: 0.25;
            transition: all 0.3s ease;
        }

        .side-click-area:hover {
            opacity: 0.8;
        }

        .side-click-area.active {
            opacity: 1;
        }

        .side-click-area .guide-box {
            transition: all 0.3s ease;
        }

        .side-click-area.active .guide-box {
            fill: currentColor;
            stroke: currentColor;
        }

        #click-vertical-3.active .guide-box {
            fill: #2563eb;
            stroke: #2563eb;
        }

        #click-vertical-3.active .guide-text {
            fill: #ffffff;
        }

        #click-horizontal-3.active .guide-box {
            fill: #9333ea;
            stroke: #9333ea;
        }

        #click-horizontal-3.active .guide-text {
            fill: #ffffff;
        }

        /* === 左/右分割小标签样式 === */
        .liquid-label-inner-small {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: inherit;
            font-size: 0.75rem;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            width: 100%;
            height: 100%;
            white-space: nowrap;
        }

        /* === 隐藏卡片 === */
        .step-card-hidden {
            display: none !important;
        }

        .choice-wrapper {
            display: flex !important;
            flex-direction: column;
            justify-content: center;
            gap: 1.25rem;
            align-items: center;
            padding: 1.25rem;
        }

        .choice-btn {
            width: 100%;
            padding: 1rem 0.5rem;
            font-size: 1.5rem;
            color: #fff;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .choice-btn:hover {
            transform: translateY(-2px);
        }

        .choice-btn-fill {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }

        .choice-btn-drink {
            background: linear-gradient(135deg, #ef4444, #f97316);
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        .choice-btn-half {
            background: linear-gradient(135deg, #9333ea, #a855f7);
            box-shadow: 0 4px 10px rgba(147, 51, 234, 0.3);
        }
    </style>
</head>

<body>

    <!-- 共享 SVG 渐变和裁切模板定义 -->
    <svg style="position: absolute; width: 0; height: 0; overflow: hidden;" version="1.1"
        xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- 纯果汁（橙色） -->
            <linearGradient id="juiceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ffa500" />
                <stop offset="100%" stop-color="#ff6d00" />
            </linearGradient>
            <!-- 纯水（蓝色） -->
            <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#a0e0ff" />
                <stop offset="100%" stop-color="#00a2ff" />
            </linearGradient>
            <!-- 混合果汁（淡一些的果汁橙色） -->
            <linearGradient id="mixedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ffd59a" />
                <stop offset="100%" stop-color="#ffb37b" />
            </linearGradient>
            <!-- 裁切 -->
            <clipPath id="cupClip">
                <rect x="30" y="20" width="100" height="140" />
            </clipPath>
        </defs>
    </svg>

    <header>
        <h1 class="gradient-title">喝果汁问题</h1>
        <div id="global-hint">💡 点击卡片展开步骤，开始互动吧！</div>
        <div class="header-btns" style="display: flex; gap: 1rem;">
            <button class="top-btn" id="toggle-fill-btn" onclick="toggleFillCards()">隐藏加水</button>
            <button class="top-btn" onclick="resetAll()">重置</button>
        </div>
    </header>

    <!-- 横向滚动卡片总容器 -->
    <main class="slider-container">

        <!-- 左切换箭头 -->
        <button class="slider-btn left" id="slider-prev" onclick="moveSlider(-1)" disabled>
            <svg style="width: 1.5rem; height: 1.5rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
            </svg>
        </button>

        <!-- 视口容器 -->
        <div class="slider-viewport" id="slider-viewport">
            <div class="slider-track" id="slider-track">

                <!-- 第一卡片：第一步（喝半杯） -->
                <section class="step-card" data-step="1" id="card-1">
                    <span class="step-badge badge-drink" onclick="expandStep(1)">第一步</span>
                    <h2 class="step-action">喝半杯</h2>

                    <div class="cup-wrapper">
                        <svg viewBox="0 0 160 195" width="100%" height="100%">
                            <g clip-path="url(#cupClip)">
                                <rect x="30" y="20" width="100" height="140" fill="#f8fafc" opacity="0.6" />
                                <rect id="water-1" class="liquid-rect" x="30" y="160" width="100" height="0"
                                    fill="url(#waterGrad)" />
                                <rect id="juice-1" class="liquid-rect" x="30" y="20" width="100" height="140"
                                    fill="url(#juiceGrad)" />

                                <foreignObject id="juice-label-1" class="liquid-label" x="30" y="75" width="100"
                                    height="30">
                                    <div xmlns="http://www.w3.org/1999/xhtml" class="liquid-label-inner">果汁</div>

    <script>
        // === 辅助函数：将分数字符串格式化为纵向分数形式 ===
        function getFractionLabelHtml(text, isSmall = false) {
            if (!text) return '';
            // 将 1/2 替换为 HTML 纵向分数
            let html = text.replace(/1\/2/g, '<div class="fraction-box"><span class="fraction-num">1</span><span class="fraction-denom">2</span></div>');
            // 将 1/4 替换为 HTML 纵向分数
            html = html.replace(/1\/4/g, '<div class="fraction-box"><span class="fraction-num">1</span><span class="fraction-denom">4</span></div>');
            const innerClass = isSmall ? 'liquid-label-inner-small' : 'liquid-label-inner';
            return `<div xmlns="http://www.w3.org/1999/xhtml" class="${innerClass}">${html}</div>`;
        }

        function setLabel(el, targetY, text, opacity = '1') {
            if (!el) return;
            el.setAttribute('y', (targetY - 15).toString());
            el.setAttribute('opacity', opacity);
            if (text !== undefined) {
                const isSmall = el.id.endsWith('-L') || el.id.endsWith('-R');
                el.innerHTML = getFractionLabelHtml(text, isSmall);
            }
        }

        // === 状态管理 ===
        const state = {
            step1: false,
            step2: false,
            step3: false
        };

        const revealed = {
            'j-1': false, 'w-1': false,
            'add-w-2': false,
            'j-3': false, 'w-3': false,
            'j-4': false, 'w-4': false,
            'add-w-4': false,
            'j-5a': false, 'w-5a': false,
            'j-5h': false, 'w-5h': false,
            'j-6': false, 'w-6': false
        };

        // 卡片展开状态管理
        let cardExpanded = {
            1: true,
            2: false,
            3: false
        };

        // 按钮交互控制变量
        let step2Stage = 1;
        let waterProgress2 = 0;
        let dragProgress1 = 0;
        let separationProgress2 = 0;
        let dragProgress3 = 0;
        let showVerticalSplit3 = false;
        let showHorizontalSplit3 = false;

        // === 第四步状态 ===
        let step4Visible = false;
        let step4Choice = null;       // null | 'fill' | 'drink_all'
        let step4Stage = 1;           // 1=加水, 2=分离
        let waterProgress4 = 0;       // 加水进度 0→1
        let separationProgress4 = 0;  // 分离进度 0→1
        let dragProgress4 = 0;        // 喝完进度 0→1

        // === 第五步状态 ===
        let step5Visible = false;
        let step5Choice = null;       // null | 'drink_all' | 'drink_half'
        let dragProgress5 = 0;
        let showVerticalSplit5 = false;
        let showHorizontalSplit5 = false;

        // === 第六步状态 ===
        let step6Visible = false;
        let dragProgress6 = 0;

        // 统一求出的分数 HTML 代码
        const answersHtml = {
            'j-1': '<div class="fraction-box"><span class="fraction-num">1</span><span class="fraction-denom">2</span></div> 杯',
            'w-1': '0 杯',
            'add-w-2': '<div class="fraction-box"><span class="fraction-num">1</span><span class="fraction-denom">2</span></div> 杯',
            'j-3': '<div class="fraction-box"><span class="fraction-num">1</span><span class="fraction-denom">4</span></div> 杯',
            'w-3': '<div class="fraction-box"><span class="fraction-num">1</span><span class="fraction-denom">4</span></div> 杯',
            'j-4': '<div class="fraction-box"><span class="fraction-num">1</span><span class="fraction-denom">4</span></div> 杯',
            'w-4': '<div class="fraction-box"><span class="fraction-num">1</span><span class="fraction-denom">4</span></div> 杯',
            'add-w-4': '<div class="fraction-box"><span class="fraction-num">1</span><span class="fraction-denom">2</span></div> 杯',
            'j-5a': '<div class="fraction-box"><span class="fraction-num">1</span><span class="fraction-denom">4</span></div> 杯',
            'w-5a': '<div class="fraction-box"><span class="fraction-num">3</span><span class="fraction-denom">4</span></div> 杯',
            'j-5h': '<div class="fraction-box"><span class="fraction-num">1</span><span class="fraction-denom">8</span></div> 杯',
            'w-5h': '<div class="fraction-box"><span class="fraction-num">3</span><span class="fraction-denom">8</span></div> 杯',
            'j-6': '<div class="fraction-box"><span class="fraction-num">1</span><span class="fraction-denom">8</span></div> 杯',
            'w-6': '<div class="fraction-box"><span class="fraction-num">3</span><span class="fraction-denom">8</span></div> 杯'
        };

        // === 横向滑块交互逻辑 ===
        let sliderIndex = 0;

        function getSliderParams() {
            const width = window.innerWidth;
            let visibleCards = 3;
            if (width < 768) {
                visibleCards = 1;
            } else if (width < 1024) {
                visibleCards = 2;
            }
            const cardsCount = document.querySelectorAll('.step-card:not(.step-card-hidden)').length;
            const maxIndex = Math.max(0, cardsCount - visibleCards);
            return { visibleCards, maxIndex };
        }

        function moveSlider(direction) {
            let { maxIndex } = getSliderParams();

            if (direction === 1 && sliderIndex >= maxIndex) {
                // 尝试展示下一步
                if (!step4Visible) {
                    step4Visible = true;
                    render();
                    maxIndex = getSliderParams().maxIndex;
                } else if (step4Choice === 'fill' && !step5Visible) {
                    step5Visible = true;
                    render();
                    maxIndex = getSliderParams().maxIndex;
                } else if (step5Choice === 'drink_half' && !step6Visible) {
                    step6Visible = true;
                    render();
                    initDragStep6();
                    maxIndex = getSliderParams().maxIndex;
                }
            }

            sliderIndex = Math.max(0, Math.min(maxIndex, sliderIndex + direction));
            scrollSlider();
        }

        // === 选择函数 ===
        function makeStep4Choice(type, event) {
            if (event) event.stopPropagation();
            step4Choice = type;
            if (type === 'fill') {
                step4Stage = 1;
                waterProgress4 = 0;
                separationProgress4 = 0;
            } else {
                dragProgress4 = 0;
            }
            render();
            initDragStep4();
            setTimeout(() => scrollSlider(), 100);
        }

        function makeStep5Choice(type, event) {
            if (event) event.stopPropagation();
            step5Choice = type;
            dragProgress5 = 0;
            showVerticalSplit5 = false;
            showHorizontalSplit5 = false;
            render();
            initDragStep5();
            setTimeout(() => scrollSlider(), 100);
        }

        // === 重选逻辑 ===
        function reselectStep(stepNum) {
            if (stepNum === 4) {
                step4Choice = null;
                step5Visible = false;
                step5Choice = null;
                step6Visible = false;
                step4Stage = 1;
                waterProgress4 = 0;
                separationProgress4 = 0;
                dragProgress4 = 0;
            } else if (stepNum === 5) {
                step5Choice = null;
                step6Visible = false;
                dragProgress5 = 0;
                showVerticalSplit5 = false;
                showHorizontalSplit5 = false;
            }
            render();
            setTimeout(() => {
                const { maxIndex } = getSliderParams();
                sliderIndex = Math.min(sliderIndex, maxIndex);
                scrollSlider();
            }, 100);
        }

        // === 分割切换 ===
        function toggleSplit3(type, event) {
            if (event) event.stopPropagation();
            if (type === 'vertical') {
                if (showVerticalSplit3) {
                    showVerticalSplit3 = false;
                } else {
                    showVerticalSplit3 = true;
                    showHorizontalSplit3 = false;
                }
            } else if (type === 'horizontal') {
                if (showHorizontalSplit3) {
                    showHorizontalSplit3 = false;
                } else {
                    showHorizontalSplit3 = true;
                    showVerticalSplit3 = false;
                }
            }
            dragProgress3 = 0;
            render();
        }

        function toggleSplit5(type, event) {
            if (event) event.stopPropagation();
            if (type === 'vertical') {
                if (showVerticalSplit5) {
                    showVerticalSplit5 = false;
                } else {
                    showVerticalSplit5 = true;
                    showHorizontalSplit5 = false;
                }
            } else if (type === 'horizontal') {
                if (showHorizontalSplit5) {
                    showHorizontalSplit5 = false;
                } else {
                    showHorizontalSplit5 = true;
                    showVerticalSplit5 = false;
                }
            }
            dragProgress5 = 0;
            render();
        }

        function revealIndividual(id) {
            revealed[id] = true;
            render();
        }

        // === 卡片可见性切换 ===
        function toggleCardVisible(id, visible) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('step-card-hidden', !visible);
        }

        let hideFillCards = false;
        function toggleFillCards() {
            hideFillCards = !hideFillCards;
            const btn = document.getElementById('toggle-fill-btn');
            if (hideFillCards) {
                btn.innerText = '恢复显示';
            } else {
                btn.innerText = '隐藏加水';
            }
            render();
            setTimeout(() => {
                const { maxIndex } = getSliderParams();
                sliderIndex = Math.min(sliderIndex, maxIndex);
                scrollSlider();
            }, 100);
        }

        function updateCardVisibility() {
            toggleCardVisible('card-2', !hideFillCards);

            toggleCardVisible('card-4-choice', step4Visible && step4Choice === null);
            toggleCardVisible('card-4-fill', step4Choice === 'fill' && !hideFillCards);
            toggleCardVisible('card-4-drink', step4Choice === 'drink_all');

            const show5 = step4Choice === 'fill';
            toggleCardVisible('card-5-choice', show5 && step5Visible && step5Choice === null);
            toggleCardVisible('card-5-drink-all', show5 && step5Choice === 'drink_all');
            toggleCardVisible('card-5-drink-half', show5 && step5Choice === 'drink_half');

            const show6 = step5Choice === 'drink_half';
            toggleCardVisible('card-6-drink-all', show6 && step6Visible);
        }

        // === 滚动和布局 ===
        function scrollSlider() {
            const viewport = document.getElementById('slider-viewport');
            const track = document.getElementById('slider-track');
            const cards = document.querySelectorAll('.step-card:not(.step-card-hidden)');
            if (cards.length === 0 || !viewport) return;

            const { maxIndex } = getSliderParams();
            sliderIndex = Math.min(sliderIndex, maxIndex);

            const cardWidth = cards[0].getBoundingClientRect().width;
            const gap = parseFloat(getComputedStyle(track).gap) || 16;

            viewport.scrollTo({
                left: sliderIndex * (cardWidth + gap),
                behavior: 'smooth'
            });

            document.getElementById('slider-prev').disabled = (sliderIndex === 0);

            // 右按钮：如果还没到最后的"结束"卡片就可以继续
            let canAddMore = false;
            if (!step4Visible) {
                canAddMore = true;
            } else if (step4Choice === 'fill' && !step5Visible) {
                canAddMore = true;
            } else if (step5Choice === 'drink_half' && !step6Visible) {
                canAddMore = true;
            }
            document.getElementById('slider-next').disabled = (sliderIndex === maxIndex && !canAddMore);
        }

        window.addEventListener('resize', () => {
            scrollSlider();
        });

        // === 步骤折叠与展开逻辑 ===
        function expandStep(stepNum) {
            if (cardExpanded[stepNum]) return;
            cardExpanded[stepNum] = true;
            render();
            setTimeout(() => {
                const { maxIndex } = getSliderParams();
                if (sliderIndex < maxIndex) {
                    sliderIndex = maxIndex;
                    scrollSlider();
                }
            }, 100);
        }

        // === 眼睛交互切换逻辑 ===
        function toggleSeparated(stepNum, event) {
            event.stopPropagation();
            if (stepNum === 2) {
                showSeparated2 = !showSeparated2;
            } else if (stepNum === 3) {
                showLines3 = !showLines3;
            }
            render();
        }

        // === 重置所有状态 ===
        function resetAll() {
            for (let key in state) state[key] = false;
            for (let key in revealed) revealed[key] = false;

            dragProgress1 = 0;
            separationProgress2 = 0;
            dragProgress3 = 0;
            showVerticalSplit3 = false;
            showHorizontalSplit3 = false;
            step2Stage = 1;
            waterProgress2 = 0;

            // 重置第四步
            step4Visible = false;
            step4Choice = null;
            step4Stage = 1;
            waterProgress4 = 0;
            separationProgress4 = 0;
            dragProgress4 = 0;

            // 重置第五步
            step5Visible = false;
            step5Choice = null;
            dragProgress5 = 0;
            showVerticalSplit5 = false;
            showHorizontalSplit5 = false;

            cardExpanded = { 1: true, 2: false, 3: false };
            sliderIndex = 0;

            render();
            scrollSlider();
        }

        // === 渲染逻辑 ===
        function render() {
            // 卡片可见性
            updateCardVisibility();

            // 渲染卡片展开与收回样式 (步骤 1-3)
            for (let i = 1; i <= 3; i++) {
                const card = document.getElementById(`card-${i}`);
                if (card) {
                    if (cardExpanded[i]) {
                        card.classList.remove('collapsed');
                    } else {
                        card.classList.add('collapsed');
                    }
                }
            }

            // --- 第一步杯子渲染 与 拖动表面控制 ---
            const juice1 = document.getElementById('juice-1');
            const water1 = document.getElementById('water-1');
            const jL1 = document.getElementById('juice-label-1');
            const wL1 = document.getElementById('water-label-1');
            const surface1 = document.getElementById('surface-group-1');

            if (cardExpanded[1]) {
                surface1.style.display = 'block';
                const yVal = 20 + 70 * dragProgress1;
                surface1.setAttribute('transform', `translate(0, ${yVal - 20})`);

                juice1.setAttribute('y', yVal.toString());
                juice1.setAttribute('height', (160 - yVal).toString());

                water1.setAttribute('y', '160');
                water1.setAttribute('height', '0');

                if (dragProgress1 >= 1) {
                    setLabel(jL1, 90 + 35, '果汁', '1');
                    setLabel(wL1, 160, '', '0');
                } else {
                    setLabel(jL1, yVal + (160 - yVal) / 2, '果汁', '1');
                    setLabel(wL1, 160, '', '0');
                }
            } else {
                surface1.style.display = 'none';
                juice1.setAttribute('y', '20');
                juice1.setAttribute('height', '140');
                water1.setAttribute('y', '160');
                water1.setAttribute('height', '0');
                setLabel(jL1, 90, '果汁', '1');
                setLabel(wL1, 160, '', '0');
                dragProgress1 = 0;
            }

            // --- 第二步杯子渲染 ---
            const juice2 = document.getElementById('juice-2');
            const water2 = document.getElementById('water-2');
            const jL2 = document.getElementById('juice-label-2');
            const wL2 = document.getElementById('water-label-2');
            const mixed2 = document.getElementById('juice-mixed-2');
            const mL2 = document.getElementById('mixed-label-2');
            const waterGroup2 = document.getElementById('water-group-2');
            const membrane2 = document.getElementById('membrane-group-2');

            if (cardExpanded[2]) {
                if (step2Stage === 1) {
                    waterGroup2.style.display = 'block';
                    membrane2.style.display = 'none';

                    const yVal = 90 - 70 * waterProgress2;
                    waterGroup2.setAttribute('transform', `translate(0, ${yVal - 20})`);

                    mixed2.setAttribute('y', yVal.toString());
                    mixed2.setAttribute('height', (160 - yVal).toString());
                    mixed2.setAttribute('opacity', '1');

                    juice2.setAttribute('y', yVal.toString());
                    juice2.setAttribute('height', (160 - yVal).toString());
                    juice2.setAttribute('opacity', (1 - waterProgress2).toString());

                    water2.setAttribute('height', '0');
                    jL2.setAttribute('opacity', '0');
                    wL2.setAttribute('opacity', '0');

                    if (waterProgress2 === 0) {
                        setLabel(mL2, yVal + (160 - yVal) / 2, '果汁', '1');
                    } else {
                        setLabel(mL2, yVal + (160 - yVal) / 2, '混合果汁', '1');
                    }
                } else {
                    waterGroup2.style.display = 'none';
                    membrane2.style.display = 'block';

                    const p = separationProgress2;
                    const yVal = 20 + 70 * p;
                    membrane2.setAttribute('transform', `translate(0, ${yVal - 20})`);

                    water2.setAttribute('y', '20');
                    water2.setAttribute('height', Math.max(0, yVal - 20).toString());
                    water2.setAttribute('opacity', p.toString());

                    mixed2.setAttribute('y', yVal.toString());
                    mixed2.setAttribute('height', (160 - yVal).toString());
                    mixed2.setAttribute('opacity', (1 - p).toString());

                    juice2.setAttribute('y', yVal.toString());
                    juice2.setAttribute('height', (160 - yVal).toString());
                    juice2.setAttribute('opacity', p.toString());

                    if (p > 0.5) {
                        setLabel(wL2, 20 + (yVal - 20) / 2, '水', '1');
                        setLabel(jL2, yVal + (160 - yVal) / 2, '果汁', '1');
                        setLabel(mL2, 90, '', '0');

                    hintText = '💡 按住橙色横条向下拖动，把剩下的全部喝完吧！';
                } else if (dragProgress5 < 1) {
                    hintText = '💡 继续向下拖动，直到喝完';
                } else {
                    hintText = '💡 思考：全部喝完了，共喝掉了多少果汁和水？';
                }
            } else if (step5Visible && step5Choice === null && step4Choice === 'fill') {
                hintText = '💡 选择下一步：直接喝完还是再喝半杯？';
            } else if (step4Choice === 'fill') {
                if (step4Stage === 1) {
                    if (waterProgress4 === 0) {
                        hintText = '💡 按住蓝色横条往上拖动，加满水';
                    } else if (waterProgress4 < 1) {
                        hintText = '💡 继续向上拖动，直到杯子加满';
                    }
                } else {
                    if (separationProgress4 === 0) {
                        hintText = '💡 按住顶部的灰色横条向下拖动，分离水和果汁';
                    } else if (separationProgress4 < 1) {
                        hintText = '💡 继续向下拖动，直到完全分离';
                    } else {
                        hintText = '💡 思考：加满水后杯中各有多少？';
                    }
                }
            } else if (step4Choice === 'drink_all') {
                if (dragProgress4 === 0) {
                    hintText = '💡 按住橙色横条向下拖动，把剩下的全部喝完吧！';
                } else if (dragProgress4 < 1) {
                    hintText = '💡 继续向下拖动，直到喝完';
                } else {
                    hintText = '💡 思考：全部喝完了，共喝掉了多少果汁和水？';
                }
            } else if (step4Visible && step4Choice === null) {
                hintText = '💡 选择下一步：加满水还是直接喝完？';
            } else if (cardExpanded[3]) {
                if (!showVerticalSplit3 && !showHorizontalSplit3) {
                    hintText = '💡 点击杯子右侧的 1/2 或 1/4 标签查看不同的等分均分模型';
                } else if (dragProgress3 === 0) {
                    hintText = showVerticalSplit3 ? '💡 按住右侧半杯的紫色横条向下拖动，表示喝掉半杯' : '💡 按住杯子顶部的紫色横条向下拖动，表示喝掉半杯';
                } else if (dragProgress3 > 0 && dragProgress3 < 1) {
                    hintText = '💡 继续向下拖动，直到喝完半杯';
                } else {
                    hintText = '💡 思考：又喝了半杯，喝掉了多少果汁和水？';
                }
            } else if (cardExpanded[2]) {
                if (step2Stage === 1) {
                    if (waterProgress2 === 0) {
                        hintText = '💡 按住杯子中间 的 蓝色横条往上拖动，加满水';
                    } else if (waterProgress2 > 0 && waterProgress2 < 1) {
                        hintText = '💡 继续向上拖动，直到杯子加满';
                    }
                } else {
                    if (separationProgress2 === 0) {
                        hintText = '💡 按住杯子顶部的灰色横条向下拖动，分离水和果汁';
                    } else if (separationProgress2 > 0 && separationProgress2 < 1) {
                        hintText = '💡 继续向下拖动，直到完全分离';
                    } else {
                        hintText = '💡 思考：加满水又分离开，喝掉了多少果汁和水？';
                    }
                }
            } else if (cardExpanded[1]) {
                if (dragProgress1 === 0) {
                    hintText = '💡 按住杯子顶部的橙色表面横条向下拖动，喝掉半杯果汁';
                } else if (dragProgress1 > 0 && dragProgress1 < 1) {
                    hintText = '💡 继续向下拖动，直到 1/2 刻度';
                } else {
                    hintText = '💡 思考：喝掉了多少果汁和水？';
                }
            }

            globalHint.innerHTML = hintText;

            // --- 答案按键渲染 ---
            for (let id in revealed) {
                const btn = document.getElementById(`ans-${id}`);
                if (btn) {
                    if (revealed[id]) {
                        btn.classList.add('revealed');
                        btn.innerHTML = answersHtml[id];
                    } else {
                        btn.classList.remove('revealed');
                        btn.innerHTML = '？';
                    }
                }
            }
        }

        // === 拖拽事件初始化 (步骤 1-3) ===
        let isDraggingMembrane1 = false;
        let isDraggingMembrane2 = false;
        let isDraggingMembrane3Full = false;
        let isDraggingMembrane3R = false;

        function initDrag() {
            let svg1Rect = null;
            let svg2Rect = null;
            let svg3Rect = null;

            // --- 第一步拖拽事件 ---
            const handle1 = document.getElementById('surface-group-1');
            const svg1 = handle1.closest('svg');

            handle1.addEventListener('pointerdown', (e) => {
                isDraggingMembrane1 = true;
                handle1.setPointerCapture(e.pointerId);
                svg1Rect = svg1.getBoundingClientRect();
                updateDrag1(e);
                e.stopPropagation();
            });

            handle1.addEventListener('pointermove', (e) => {
                if (!isDraggingMembrane1) return;
                updateDrag1(e);
                e.stopPropagation();
            });

            const onPointerUp1 = (e) => {
                if (!isDraggingMembrane1) return;
                isDraggingMembrane1 = false;
                svg1Rect = null;
                handle1.releasePointerCapture(e.pointerId);
                e.stopPropagation();
            };
            handle1.addEventListener('pointerup', onPointerUp1);
            handle1.addEventListener('pointercancel', onPointerUp1);

            function updateDrag1(e) {
                if (!svg1Rect) svg1Rect = svg1.getBoundingClientRect();
                const rect = svg1Rect;
                const clientY = e.clientY;
                const svgY = (clientY - rect.top) * (180 / rect.height);

                let yVal = Math.max(20, Math.min(90, svgY));
                dragProgress1 = (yVal - 20) / 70;

                state.step1 = (dragProgress1 > 0.1);
                render();
            }

            // --- 第二步拖拽事件 (膜) ---
            const membrane = document.getElementById('membrane-group-2');
            const svg2 = membrane.closest('svg');

            membrane.addEventListener('pointerdown', (e) => {
                isDraggingMembrane2 = true;
                membrane.setPointerCapture(e.pointerId);
                svg2Rect = svg2.getBoundingClientRect();
                updateDrag2(e);
                e.stopPropagation();
            });

            membrane.addEventListener('pointermove', (e) => {
                if (!isDraggingMembrane2) return;
                updateDrag2(e);
                e.stopPropagation();
            });

            const onPointerUp2 = (e) => {
                if (!isDraggingMembrane2) return;
                isDraggingMembrane2 = false;
                svg2Rect = null;
                membrane.releasePointerCapture(e.pointerId);
                e.stopPropagation();
            };
            membrane.addEventListener('pointerup', onPointerUp2);
            membrane.addEventListener('pointercancel', onPointerUp2);

            function updateDrag2(e) {
                if (!svg2Rect) svg2Rect = svg2.getBoundingClientRect();
                const rect = svg2Rect;
                const clientY = e.clientY;
                const svgY = (clientY - rect.top) * (180 / rect.height);

                let yVal = Math.max(20, Math.min(90, svgY));
                separationProgress2 = (yVal - 20) / 70;

                state.step2 = (separationProgress2 > 0.1);
                render();
            }

            // --- 第二步加水拖拽事件 ---
            const waterGroup2El = document.getElementById('water-group-2');
            let isDraggingWater2 = false;

            waterGroup2El.addEventListener('pointerdown', (e) => {
                isDraggingWater2 = true;
                waterGroup2El.setPointerCapture(e.pointerId);
                svg2Rect = svg2.getBoundingClientRect();
                updateDragWater2(e);
                e.stopPropagation();
            });

            waterGroup2El.addEventListener('pointermove', (e) => {
                if (!isDraggingWater2) return;
                updateDragWater2(e);
                e.stopPropagation();
            });

            const onPointerUpWater2 = (e) => {
                if (!isDraggingWater2) return;
                isDraggingWater2 = false;
                svg2Rect = null;
                waterGroup2El.releasePointerCapture(e.pointerId);
                if (waterProgress2 >= 0.95) {
                    waterProgress2 = 1;
                    step2Stage = 2;
                    render();
                }
                e.stopPropagation();
            };
            waterGroup2El.addEventListener('pointerup', onPointerUpWater2);
            waterGroup2El.addEventListener('pointercancel', onPointerUpWater2);

            function updateDragWater2(e) {
                if (!svg2Rect) svg2Rect = svg2.getBoundingClientRect();
                const rect = svg2Rect;
                const clientY = e.clientY;
                const svgY = (clientY - rect.top) * (180 / rect.height);

                let yVal = Math.max(20, Math.min(90, svgY));
                waterProgress2 = (90 - yVal) / 70;

                if (waterProgress2 >= 0.95) {
                    waterProgress2 = 1;
                }
                render();
            }

            // --- 第三步全宽拖拽事件 ---
            const handle3Full = document.getElementById('surface-group-3-Full');
            const svg3 = handle3Full.closest('svg');

            handle3Full.addEventListener('pointerdown', (e) => {
                isDraggingMembrane3Full = true;
                handle3Full.setPointerCapture(e.pointerId);
                svg3Rect = svg3.getBoundingClientRect();
                updateDrag3Full(e);
                e.stopPropagation();
            });

            handle3Full.addEventListener('pointermove', (e) => {
                if (!isDraggingMembrane3Full) return;
                updateDrag3Full(e);
                e.stopPropagation();
            });

            const onPointerUp3Full = (e) => {
                if (!isDraggingMembrane3Full) return;
                isDraggingMembrane3Full = false;
                svg3Rect = null;
                handle3Full.releasePointerCapture(e.pointerId);
                e.stopPropagation();
            };
            handle3Full.addEventListener('pointerup', onPointerUp3Full);
            handle3Full.addEventListener('pointercancel', onPointerUp3Full);

            function updateDrag3Full(e) {
                if (!svg3Rect) svg3Rect = svg3.getBoundingClientRect();
                const rect = svg3Rect;
                const clientY = e.clientY;
                const svgY = (clientY - rect.top) * (180 / rect.height);

                let yVal = Math.max(20, Math.min(90, svgY));
                dragProgress3 = (yVal - 20) / 70;

                state.step3 = (dragProgress3 > 0.1);
                render();
            }

            // --- 第三步右半侧拖拽事件 ---
            const handle3R = document.getElementById('surface-group-3-R');

            handle3R.addEventListener('pointerdown', (e) => {
                isDraggingMembrane3R = true;
                handle3R.setPointerCapture(e.pointerId);
                svg3Rect = svg3.getBoundingClientRect();
                updateDrag3R(e);
                e.stopPropagation();
            });

            handle3R.addEventListener('pointermove', (e) => {
                if (!isDraggingMembrane3R) return;
                updateDrag3R(e);
                e.stopPropagation();
            });

            const onPointerUp3R = (e) => {
                if (!isDraggingMembrane3R) return;
                isDraggingMembrane3R = false;
                svg3Rect = null;
                handle3R.releasePointerCapture(e.pointerId);
                e.stopPropagation();
            };
            handle3R.addEventListener('pointerup', onPointerUp3R);
            handle3R.addEventListener('pointercancel', onPointerUp3R);

            function updateDrag3R(e) {
                if (!svg3Rect) svg3Rect = svg3.getBoundingClientRect();
                const rect = svg3Rect;
                const clientX = e.clientX;
                const svgX = (clientX - rect.left) * (160 / rect.width);

                let xVal = Math.max(80, Math.min(130, svgX));
                dragProgress3 = (130 - xVal) / 50;

                state.step3 = (dragProgress3 > 0.1);
                render();
            }
        } // initDrag 结束

        // === 第四步拖拽初始化 (按需调用) ===
        function initDragStep4() {
            if (step4Choice === 'fill') {
                // 加水手柄
                const waterGroup4f = document.getElementById('water-group-4f');
                const svg4f = waterGroup4f.closest('svg');
                let isDragging4W = false;
                let svg4fRect = null;

                waterGroup4f.addEventListener('pointerdown', (e) => {
                    isDragging4W = true;
                    waterGroup4f.setPointerCapture(e.pointerId);
                    svg4fRect = svg4f.getBoundingClientRect();
                    updateDrag4Water(e);
                    e.stopPropagation();
                });
                waterGroup4f.addEventListener('pointermove', (e) => {
                    if (!isDragging4W) return;
                    updateDrag4Water(e);
                    e.stopPropagation();
                });
                const up4W = (e) => {
                    if (!isDragging4W) return;
                    isDragging4W = false;
                    svg4fRect = null;
                    waterGroup4f.releasePointerCapture(e.pointerId);
                    if (waterProgress4 >= 0.95) {
                        waterProgress4 = 1;
                        render();
                    }
                    e.stopPropagation();
                };
                waterGroup4f.addEventListener('pointerup', up4W);
                waterGroup4f.addEventListener('pointercancel', up4W);

                function updateDrag4Water(e) {
                    if (!svg4fRect) svg4fRect = svg4f.getBoundingClientRect();
                    const svgY = (e.clientY - svg4fRect.top) * (180 / svg4fRect.height);
                    let yVal = Math.max(20, Math.min(90, svgY));
                    waterProgress4 = (90 - yVal) / 70;
                    if (waterProgress4 >= 0.95) waterProgress4 = 1;
                    render();
                }
            } else if (step4Choice === 'drink_all') {
                // 喝完手柄
                const surface4d = document.getElementById('surface-group-4d');
                const svg4d = surface4d.closest('svg');
                let isDragging4D = false;
                let svg4dRect = null;

                surface4d.addEventListener('pointerdown', (e) => {
                    isDragging4D = true;
                    surface4d.setPointerCapture(e.pointerId);
                    svg4dRect = svg4d.getBoundingClientRect();
                    updateDrag4Drink(e);
                    e.stopPropagation();
                });
                surface4d.addEventListener('pointermove', (e) => {
                    if (!isDragging4D) return;
                    updateDrag4Drink(e);
                    e.stopPropagation();
                });
                const up4D = (e) => {
                    if (!isDragging4D) return;
                    isDragging4D = false;
                    svg4dRect = null;
                    surface4d.releasePointerCapture(e.pointerId);
                    e.stopPropagation();
                };
                surface4d.addEventListener('pointerup', up4D);
                surface4d.addEventListener('pointercancel', up4D);

                function updateDrag4Drink(e) {
                    if (!svg4dRect) svg4dRect = svg4d.getBoundingClientRect();
                    const svgY = (e.clientY - svg4dRect.top) * (180 / svg4dRect.height);
                    // 液面从 y=90 到 y=160
                    let yVal = Math.max(90, Math.min(160, svgY));
                    dragProgress4 = (yVal - 90) / 70;
                    render();
                }
            }
        }

        // 第四步膜拖拽 (分离阶段)
        function initDragStep4Membrane() {
            const membrane4f = document.getElementById('membrane-group-4f');
            const svg4f = membrane4f.closest('svg');
            let isDragging4M = false;
            let svg4fRect = null;

            membrane4f.addEventListener('pointerdown', (e) => {
                isDragging4M = true;
                membrane4f.setPointerCapture(e.pointerId);
                svg4fRect = svg4f.getBoundingClientRect();
                updateDrag4Membrane(e);
                e.stopPropagation();
            });
            membrane4f.addEventListener('pointermove', (e) => {
                if (!isDragging4M) return;
                updateDrag4Membrane(e);
                e.stopPropagation();
            });
            const up4M = (e) => {
                if (!isDragging4M) return;
                isDragging4M = false;
                svg4fRect = null;
                membrane4f.releasePointerCapture(e.pointerId);
                e.stopPropagation();
            };
            membrane4f.addEventListener('pointerup', up4M);
            membrane4f.addEventListener('pointercancel', up4M);

            function updateDrag4Membrane(e) {
                if (!svg4fRect) svg4fRect = svg4f.getBoundingClientRect();
                const svgY = (e.clientY - svg4fRect.top) * (180 / svg4fRect.height);
                // 膜从 y=20 到 y=125 (水占3/4=105px)
                let yVal = Math.max(20, Math.min(125, svgY));
                separationProgress4 = (yVal - 20) / 105;
                render();
            }
        }

        // === 第五步拖拽初始化 (按需调用) ===
        function initDragStep5() {
            if (step5Choice === 'drink_all') {
                const surface5a = document.getElementById('surface-group-5a');
                const svg5a = surface5a.closest('svg');
                let isDragging5A = false;
                let svg5aRect = null;

                surface5a.addEventListener('pointerdown', (e) => {
                    isDragging5A = true;
                    surface5a.setPointerCapture(e.pointerId);
                    svg5aRect = svg5a.getBoundingClientRect();
                    updateDrag5A(e);
                    e.stopPropagation();
                });
                surface5a.addEventListener('pointermove', (e) => {
                    if (!isDragging5A) return;
                    updateDrag5A(e);
                    e.stopPropagation();
                });
                const up5A = (e) => {
                    if (!isDragging5A) return;
                    isDragging5A = false;
                    svg5aRect = null;
                    surface5a.releasePointerCapture(e.pointerId);
                    e.stopPropagation();
                };
                surface5a.addEventListener('pointerup', up5A);
                surface5a.addEventListener('pointercancel', up5A);

                function updateDrag5A(e) {
                    if (!svg5aRect) svg5aRect = svg5a.getBoundingClientRect();
                    const svgY = (e.clientY - svg5aRect.top) * (180 / svg5aRect.height);
                    let yVal = Math.max(20, Math.min(160, svgY));
                    dragProgress5 = (yVal - 20) / 140;
                    render();
                }
            } else if (step5Choice === 'drink_half') {
                // 全宽拖拽
                const handle5hFull = document.getElementById('surface-group-5h-Full');
                const svg5h = handle5hFull.closest('svg');
                let isDragging5hFull = false;
                let svg5hRect = null;

                handle5hFull.addEventListener('pointerdown', (e) => {
                    isDragging5hFull = true;
                    handle5hFull.setPointerCapture(e.pointerId);
                    svg5hRect = svg5h.getBoundingClientRect();
                    updateDrag5hFull(e);
                    e.stopPropagation();
                });
                handle5hFull.addEventListener('pointermove', (e) => {
                    if (!isDragging5hFull) return;
                    updateDrag5hFull(e);
                    e.stopPropagation();
                });
                const up5hFull = (e) => {
                    if (!isDragging5hFull) return;
                    isDragging5hFull = false;
                    svg5hRect = null;
                    handle5hFull.releasePointerCapture(e.pointerId);
                    e.stopPropagation();
                };
                handle5hFull.addEventListener('pointerup', up5hFull);
                handle5hFull.addEventListener('pointercancel', up5hFull);

                function updateDrag5hFull(e) {
                    if (!svg5hRect) svg5hRect = svg5h.getBoundingClientRect();
                    const svgY = (e.clientY - svg5hRect.top) * (180 / svg5hRect.height);
                    let yVal = Math.max(20, Math.min(90, svgY));
                    dragProgress5 = (yVal - 20) / 70;
                    render();
                }

                // 右侧拖拽
                const handle5hR = document.getElementById('surface-group-5h-R');
                let isDragging5hR = false;

                handle5hR.addEventListener('pointerdown', (e) => {
                    isDragging5hR = true;
                    handle5hR.setPointerCapture(e.pointerId);
                    svg5hRect = svg5h.getBoundingClientRect();
                    updateDrag5hR(e);
                    e.stopPropagation();
                });
                handle5hR.addEventListener('pointermove', (e) => {
                    if (!isDragging5hR) return;
                    updateDrag5hR(e);
                    e.stopPropagation();
                });
                const up5hR = (e) => {
                    if (!isDragging5hR) return;
                    isDragging5hR = false;
                    svg5hRect = null;
                    handle5hR.releasePointerCapture(e.pointerId);
                    e.stopPropagation();
                };
                handle5hR.addEventListener('pointerup', up5hR);
                handle5hR.addEventListener('pointercancel', up5hR);

                function updateDrag5hR(e) {
                    if (!svg5hRect) svg5hRect = svg5h.getBoundingClientRect();
                    const svgX = (e.clientX - svg5hRect.left) * (160 / svg5hRect.width);
                    let xVal = Math.max(80, Math.min(130, svgX));
                    dragProgress5 = (130 - xVal) / 50;
                    render();
                }
            }
        }

        // === 第六步拖拽初始化 ===
        function initDragStep6() {
            const surface6 = document.getElementById('surface-group-6');
            if (!surface6) return;
            const svg6 = surface6.closest('svg');
            let isDragging6 = false;
            let svg6Rect = null;

            surface6.addEventListener('pointerdown', (e) => {
                isDragging6 = true;
                surface6.setPointerCapture(e.pointerId);
                svg6Rect = svg6.getBoundingClientRect();
                updateDrag6(e);
                e.stopPropagation();
            });
            surface6.addEventListener('pointermove', (e) => {
                if (!isDragging6) return;
                updateDrag6(e);
                e.stopPropagation();
            });
            const up6 = (e) => {
                if (!isDragging6) return;
                isDragging6 = false;
                svg6Rect = null;
                surface6.releasePointerCapture(e.pointerId);
                e.stopPropagation();
            };
            surface6.addEventListener('pointerup', up6);
            surface6.addEventListener('pointercancel', up6);

            function updateDrag6(e) {
                if (!svg6Rect) svg6Rect = svg6.getBoundingClientRect();
                const svgY = (e.clientY - svg6Rect.top) * (180 / svg6Rect.height);
                let yVal = Math.max(90, Math.min(160, svgY));
                dragProgress6 = (yVal - 90) / 70;
                render();
            }
        }

        // 初始化首次渲染与滑块计算
        initDrag();
        render();
        setTimeout(scrollSlider, 200);

    </script>
</body>
