<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垃圾总量自动推算笔记本</title>
    <style>
        :root {
            --primary: #FF5600;
            --bg: #F4F3EC;
            --text: #0C0302;
            --secondary: #74706E;
            --accent: #FF8941;
            --box-bg: #FEFCF6;
            --border: #A09D94;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(#d5d2c8 1px, transparent 1px);
            background-size: 20px 20px;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        h1 {
            font-size: 2rem;
            margin: 0;
            font-weight: bold;
            color: rgba(0, 0, 0, 0.1);
            letter-spacing: 2px;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            padding: 0rem;
            z-index: 10;
        }

        .notebook-wrapper {
            z-index: 100;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .notebook {
            width: 90%;
            max-width: 880px;
            background: #fff;
            border: 1px solid #e0e0e0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            position: relative;
            padding: 30px 60px;
            /* Notebook horizontal lines */
            background-image: repeating-linear-gradient(transparent, transparent 59px, #d1d1d1 59px, #d1d1d1 60px);
            background-size: 100% 60px;
            background-position: 0 30px;
            background-attachment: local;
            min-height: 500px;
            max-height: 75vh;
            overflow-y: auto;
            font-size: 24px;
            line-height: 60px;
            border-radius: 4px;
        }

        .notebook::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 40px;
            width: 2px;
            background-color: #ff9999;
            z-index: 5;
        }

        .row {
            height: 60px;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .row-label {
            margin-right: 10px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            white-space: nowrap;
        }

        .tag-who {
            color: #007AFF;
            font-size: 2rem;
            padding: 2px 6px;
            background: rgba(0, 122, 255, 0.1);
            border-radius: 4px;
            margin-right: 8px;
        }

        .tag-time {
            color: #34C759;
            font-size: 2rem;
            padding: 2px 6px;
            background: rgba(52, 199, 89, 0.1);
            border-radius: 4px;
        }

        .input-box {
            display: block;
            flex: 1;
            min-width: 0;
            height: 50px;
            line-height: 50px;
            cursor: pointer;
            color: var(--primary);
            font-family: "Times New Roman", Times, serif;
            font-size: 3rem;
            padding: 0 10px;
            transition: background 0.2s;
            white-space: nowrap;
            overflow-x: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
            -webkit-tap-highlight-color: transparent;
        }

        .input-box::-webkit-scrollbar {
            display: none;
        }

        .input-box:hover {
            background: rgba(255, 86, 0, 0.05);
        }

        .input-box:empty::before {
            content: "点击输入...";
            color: #ddd;
            font-size: 2rem;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* Toolbar styles */
        .toolbar {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 6000;
            background: white;
            padding: 0px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .toolbar button {
            background: none;
            border: 2px solid transparent;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toolbar button:hover {
            background: var(--bg);
        }

        .toolbar button.active {
            border-color: var(--primary);
            background: #fff7ed;
        }

        #draw-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5000;
        }

        #draw-canvas.drawing-active {
            pointer-events: auto;
        }

        /* Calculator Styles */
        .calculator {
            position: absolute;
            background: var(--box-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(4, 50px);
            gap: 8px;
            z-index: 6000;
        }

        .calculator.hidden {
            display: none !important;
        }

        .calculator button {
            height: 50px;
            font-size: 22px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            transition: all 0.1s;
        }

        .calculator button:active {
            background: #e0e0e0;
            transform: scale(0.95);
        }

        .calculator button.btn-wide {
            grid-column: span 3;
            background: var(--primary);
            color: #fff;
            border: none;
            font-weight: bold;
        }

        .calculator button.btn-wide:active {
            background: var(--accent);
        }

        .calculator button.btn-op {
            background: #f5f5f5;
            color: var(--primary);
            font-weight: bold;
            font-size: 26px;
        }

        #btn-next {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 56px;
            height: 56px;
            font-size: 38px;
            border-radius: 50%;
            border: none;
            background-color: var(--primary);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 86, 0, 0.3);
            transition: all 0.2s;
            z-index: 6000;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        #btn-next:hover {
            background-color: var(--accent);
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 6px 15px rgba(255, 86, 0, 0.4);
        }

        #btn-next:active {
            transform: translateY(-50%) scale(0.95);
            box-shadow: 0 2px 5px rgba(255, 86, 0, 0.3);
        }
    </style>
</head>

<body>
    <canvas id="draw-canvas"></canvas>

    <header>
        <h1>垃圾总量自动推算笔记本</h1>
    </header>

    <div class="toolbar" id="toolbar">
        <button id="tool-pen" title="画笔">✏️</button>
        <button id="tool-eraser-mode" title="橡皮擦">🧽</button>
        <button id="tool-eraser" title="一键清空">🧹</button>
        <button id="btn-reset" title="重置" style="transition: transform 0.4s;">🔄</button>
    </div>

    <button id="btn-next" title="添加下一行">+</button>

    <main>
        <div class="notebook-wrapper">
            <div class="notebook" id="notebook-content">
                <!-- Rows dynamically generated -->
            </div>
        </div>
    </main>

    <!-- Floating Calculator -->
    <div id="calculator" class="calculator hidden">
        <button>7</button><button>8</button><button>9</button><button class="btn-op">÷</button>
        <button>4</button><button>5</button><button>6</button><button class="btn-op">×</button>
        <button>1</button><button>2</button><button>3</button><button class="btn-op">-</button>
        <button class="btn-op">C</button><button>0</button><button>.</button><button class="btn-op">+</button>
        <button class="btn-op" style="font-size: 18px;">Del</button><button class="btn-wide">=</button>
    </div>

    <script>
        // 禁止浏览器默认的长按/右键菜单
        document.addEventListener('contextmenu', e => e.preventDefault());

        const labels = [
            "一人一天",
            "全班一天",
            "全班一周",
            "全班一月",
            "全班一年",
            "全校一年",
            "全区一年",
            "全市一年"
        ];

        let currentIndex = 0;
        const notebookContent = document.getElementById('notebook-content');
        const btnNext = document.getElementById('btn-next');

        // --- Drag and Drop Logic ---
        function setupMouseDrag(input) {
            input.setAttribute('draggable', 'false');

            input.addEventListener('dragstart', (e) => {
                if (input.textContent.trim() !== "") {
                    let parts = input.textContent.split('=');
                    let result = parts[parts.length - 1].trim();
                    e.dataTransfer.setData('text/plain', result);
                    e.dataTransfer.effectAllowed = 'copy';
                } else {
                    e.preventDefault();
                }
            });

            input.addEventListener('dragover', (e) => {
                e.preventDefault();
                if (input.dataset.computed !== "true") {
                    e.dataTransfer.dropEffect = 'copy';
                    input.style.background = 'rgba(255, 86, 0, 0.1)';
                }
            });

            input.addEventListener('dragleave', (e) => {
                input.style.background = '';
            });

            input.addEventListener('drop', (e) => {
                e.preventDefault();
                input.style.background = '';
                if (input.dataset.computed !== "true") {
                    let data = e.dataTransfer.getData('text/plain');
                    if (data) {
                        input.textContent += data;
                        input.setAttribute('draggable', 'true');
                    }
                }
            });
        }

        let touchStartData = null;

        document.addEventListener('touchstart', (e) => {
            if (isDrawModeGlobal) return;
            const target = e.target.closest('.input-box');
            if (target && target.textContent.trim() !== "") {
                const touch = e.touches[0];
                let parts = target.textContent.split('=');
                let result = parts[parts.length - 1].trim();
                touchStartData = {
                    x: touch.clientX,
                    y: touch.clientY,
                    result: result,
                    target: target,
                    isDragging: false,
                    clone: null
                };
            }
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (touchStartData) {
                const touch = e.touches[0];
                const dx = touch.clientX - touchStartData.x;
                const dy = touch.clientY - touchStartData.y;
                if (!touchStartData.isDragging && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
                    touchStartData.isDragging = true;
                    // Create visual clone
                    const clone = document.createElement('div');
                    clone.textContent = touchStartData.result;
                    clone.style.position = 'absolute';
                    clone.style.pointerEvents = 'none';
                    clone.style.zIndex = '9999';
                    clone.style.fontSize = '3rem';
                    clone.style.color = 'var(--primary)';
                    clone.style.background = '#fff';
                    clone.style.border = '2px dashed var(--primary)';
                    clone.style.padding = '0 10px';
                    clone.style.borderRadius = '8px';
                    clone.style.boxShadow = '0 4px 10px rgba(0,0,0,0.2)';
                    document.body.appendChild(clone);
                    touchStartData.clone = clone;
                }

                if (touchStartData.isDragging) {
                    if (e.cancelable) e.preventDefault(); // Stop scrolling
                    touchStartData.clone.style.left = touch.clientX + 'px';
                    touchStartData.clone.style.top = touch.clientY + 'px';
                    touchStartData.clone.style.transform = 'translate(-50%, -50%)';

                    // Highlight drop target
                    const overEl = document.elementFromPoint(touch.clientX, touch.clientY);
                    document.querySelectorAll('.input-box').forEach(el => el.style.background = '');
                    if (overEl && overEl.classList.contains('input-box') && overEl.dataset.computed !== "true") {
                        overEl.style.background = 'rgba(255, 86, 0, 0.1)';
                    }
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            if (touchStartData) {
                if (touchStartData.isDragging && touchStartData.clone) {
                    const touch = e.changedTouches[0];
                    touchStartData.clone.remove();
                    document.querySelectorAll('.input-box').forEach(el => el.style.background = '');

                    const overEl = document.elementFromPoint(touch.clientX, touch.clientY);
                    if (overEl && overEl.classList.contains('input-box') && overEl.dataset.computed !== "true") {
                        overEl.textContent += touchStartData.result;
                        overEl.setAttribute('draggable', 'true');
                    }
                    if (e.cancelable) e.preventDefault(); // prevent click event
                }
                touchStartData = null;
            }
        });


        // --- Row Generation Logic ---
        function renderRow(index) {
            const row = document.createElement('div');
            row.className = 'row';

            const label = document.createElement('div');
            label.className = 'row-label';

            const text = labels[index];
            const who = text.substring(0, 2);
            const time = text.substring(2);

            label.innerHTML = `<span class="tag-who">${who}</span><span class="tag-time">${time}</span>：`;

            const input = document.createElement('div');
            input.className = 'input-box';

            setupMouseDrag(input);

            row.appendChild(label);
            row.appendChild(input);
            notebookContent.appendChild(row);

            // Auto scroll to bottom
            setTimeout(() => {
                notebookContent.scrollTop = notebookContent.scrollHeight;
            }, 10);
        }

        // Initialize first row
        renderRow(0);

        btnNext.addEventListener('click', () => {
            currentIndex++;
            if (currentIndex < labels.length) {
                renderRow(currentIndex);
            }
            if (currentIndex === labels.length - 1) {
                btnNext.style.display = 'none';
            }
            calcEl.classList.add('hidden');
        });

        // --- Calculator Logic ---
        let currentInputBox = null;
        const calcEl = document.getElementById('calculator');

        document.addEventListener('click', (e) => {
            if (isDrawModeGlobal) return; // Ignore if drawing

            if (e.target.classList.contains('input-box')) {
                currentInputBox = e.target;
                const rect = currentInputBox.getBoundingClientRect();

                calcEl.classList.remove('hidden');

                setTimeout(() => {
                    const calcRect = calcEl.getBoundingClientRect();
                    let top = rect.bottom + window.scrollY + 10;
                    let left = rect.left + window.scrollX;

                    if (left + calcRect.width > window.innerWidth) {
                        left = window.innerWidth - calcRect.width - 20;
                    }
                    if (top + calcRect.height > window.innerHeight) {
                        top = rect.top + window.scrollY - calcRect.height - 10;
                    }
                    if (top < 10) {
                        top = 10;
                    }
                    if (left < 10) {
                        left = 10;
                    }

                    calcEl.style.left = left + 'px';
                    calcEl.style.top = top + 'px';
                }, 0);

            } else if (!e.target.closest('.calculator') && !e.target.closest('#btn-next') && !e.target.closest('.toolbar')) {
                calcEl.classList.add('hidden');
            }
        });

        calcEl.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                const val = e.target.textContent;
                handleCalcInput(val);
            }
        });

        function handleCalcInput(val) {
            if (!currentInputBox) return;

            if (val === 'C') {
                currentInputBox.textContent = '';
                delete currentInputBox.dataset.computed;
                currentInputBox.setAttribute('draggable', 'false');
                return;
            }

            if (currentInputBox.dataset.computed === "true") {
                if (val === 'Del') {
                    currentInputBox.textContent = '';
                    delete currentInputBox.dataset.computed;
                    currentInputBox.setAttribute('draggable', 'false');
                    return;
                } else if ('0123456789'.includes(val)) {
                    currentInputBox.textContent = val;
                    delete currentInputBox.dataset.computed;
                    currentInputBox.setAttribute('draggable', 'true');
                    return;
                } else if (['+', '-', '×', '÷'].includes(val)) {
                    let parts = currentInputBox.textContent.split('=');
                    let result = parts[1] ? parts[1].trim() : parts[0];
                    currentInputBox.textContent = result + val;
                    delete currentInputBox.dataset.computed;
                    currentInputBox.setAttribute('draggable', 'true');
                    return;
                } else {
                    return;
                }
            }

            let text = currentInputBox.textContent;
            if (val === 'Del') {
                currentInputBox.textContent = text.slice(0, -1);
                if (currentInputBox.textContent.trim() === "") {
                    currentInputBox.setAttribute('draggable', 'false');
                }
            } else if (val === '=') {
                try {
                    if (!text) return;
                    let expr = text.replace(/×/g, '*').replace(/÷/g, '/');
                    if (/[+\-*/]$/.test(expr)) {
                        expr = expr.slice(0, -1);
                        text = text.slice(0, -1);
                    }
                    let result = new Function('return ' + expr)();
                    result = Math.round(result * 100000000) / 100000000;
                    currentInputBox.textContent = text + '=' + result;
                    currentInputBox.dataset.computed = "true";
                    currentInputBox.setAttribute('draggable', 'true');
                    calcEl.classList.add('hidden');
                } catch (err) {
                    currentInputBox.style.color = 'red';
                    setTimeout(() => currentInputBox.style.color = 'var(--primary)', 500);
                }
            } else {
                currentInputBox.textContent += val;
                // scroll to right as user types
                currentInputBox.scrollLeft = currentInputBox.scrollWidth;
                currentInputBox.setAttribute('draggable', 'true');
            }
        }

        // 重置按钮
        document.getElementById('btn-reset').addEventListener('click', (e) => {
            e.target.style.transform = 'rotate(180deg)';
            setTimeout(() => location.reload(), 200);
        });

        // --- 画笔和橡皮擦逻辑 ---
        const canvas = document.getElementById('draw-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let isDrawModeGlobal = false;
        let isEraseMode = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 0);

        const btnPen = document.getElementById('tool-pen');
        const btnEraserMode = document.getElementById('tool-eraser-mode');
        const btnEraser = document.getElementById('tool-eraser');

        btnPen.addEventListener('click', function () {
            isDrawModeGlobal = !isDrawModeGlobal;
            if (isDrawModeGlobal) {
                isEraseMode = false;
                btnEraserMode.classList.remove('active');
                this.classList.add('active');
                canvas.classList.add('drawing-active');
            } else {
                this.classList.remove('active');
                canvas.classList.remove('drawing-active');
            }
        });

        btnEraserMode.addEventListener('click', function () {
            isDrawModeGlobal = true;
            isEraseMode = true;
            btnPen.classList.remove('active');
            this.classList.add('active');
            canvas.classList.add('drawing-active');
        });

        btnEraser.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function drawStart(e) {
            if (!isDrawModeGlobal) return;
            isDrawing = true;
            const pos = getMousePos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);

            if (isEraseMode) {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = 20;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = '#FF0000'; // 红色画笔
                ctx.lineWidth = 4;
            }

            document.addEventListener('mousemove', drawMove);
            document.addEventListener('touchmove', drawMove, { passive: false });
            document.addEventListener('mouseup', drawEnd);
            document.addEventListener('touchend', drawEnd);
        }

        function drawMove(e) {
            if (!isDrawing) return;
            if (e.cancelable) e.preventDefault();
            const pos = getMousePos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function drawEnd() {
            isDrawing = false;
            document.removeEventListener('mousemove', drawMove);
            document.removeEventListener('touchmove', drawMove);
            document.removeEventListener('mouseup', drawEnd);
            document.removeEventListener('touchend', drawEnd);
        }

        canvas.addEventListener('mousedown', drawStart);
        canvas.addEventListener('touchstart', drawStart, { passive: false });
    </script>
</body>

</html>
