                &lt;button onclick=&quot;loadLeaderboard()&quot; class=&quot;text-sm font-normal text-blue-400 hover:text-blue-600&quot;&gt;刷新&lt;/button&gt;
            &lt;/h3&gt;

    &lt;script&gt;
        const API_URL = 'https://quickform.cn/api/k4lqjqstco';
        const ALL_DATA_URL = 'https://quickform.cn/api/k4lqjqstco/all';

        let state = {
            user: null,
            level: 1,
            questionIdx: 0,
            timer: 0,
            totalTime: 0, // 累计总用时
            timerInterval: null,
            questions: [],
            isAnswering: false,
            score: 0,
            currentLevelScore: 10 // 当前关卡初始满分
        };

        // 音效生成
        function playSound(freq, type = 'sine') {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            osc.connect(gain);
            gain.connect(ctx.destination);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
        }

        // 小乘机器人逻辑
        function showBotHoverTip() {
            const bubble = document.getElementById('bot-bubble');
            const content = document.getElementById('bot-content');
            if (bubble.classList.contains('hidden')) {
                bubble.classList.remove('hidden');
                content.innerText = &quot;有什么乘法问题尽量问我&quot;;
            }
        }

        function hideBotHoverTip() {
            const bubble = document.getElementById('bot-bubble');
            const inputArea = document.getElementById('bot-input-area');
            // 如果输入框没打开，才隐藏气泡
            if (inputArea.classList.contains('hidden')) {
                bubble.classList.add('hidden');
            }
        }

        function toggleBotChat() {
            const bubble = document.getElementById('bot-bubble');
            const inputArea = document.getElementById('bot-input-area');
            const isInputHidden = inputArea.classList.contains('hidden');
            
            bubble.classList.remove('hidden');
            inputArea.classList.toggle('hidden');
            
            if (!isInputHidden) {
                // 关闭时
                bubble.classList.add('hidden');
                document.getElementById('bot-content').innerText = &quot;你好！我是小乘机器人。&quot;;
            } else {
                // 打开时
                document.getElementById('bot-content').innerText = &quot;你好！我是小乘机器人，想了解什么乘法知识？&quot;;
            }
        }

        async function askBot() {
            const input = document.getElementById('bot-input');
            const content = document.getElementById('bot-content');
            const question = input.value.trim();
            if (!question) return;

            content.innerText = &quot;思考中...&quot;;
            input.value = &quot;&quot;;

            try {
                const response = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer af22484fd77e3c73c583515984307e9d.oL75akwXjkWqnBku'
                    },
                    body: JSON.stringify({
                        model: &quot;glm-4&quot;,
                        messages: [
                            {
                                role: &quot;system&quot;,
                                content: &quot;你是一个名为'小乘机器人'的乘法知识助手。你的任务是回答乘法相关问题。如果用户问非乘法问题，请先回答用户，但必须在结尾提醒：'这是乘法知识练习，建议多关注乘法学习哦！'。所有回答必须简洁，严格控制在100字以内。&quot;
                            },
                            { role: &quot;user&quot;, content: question }
                        ]
                    })
                });

                const data = await response.json();
                const answer = data.choices[0].message.content;
                content.innerText = answer;
            } catch (e) {
                content.innerText = &quot;哎呀，我开小差了，请稍后再问我吧。&quot;;
            }
        }

        // 弹窗控制
        function toggleInstructions() {
            document.getElementById('how-to-play').classList.toggle('open');
        }

        function showRegisterModal() {
            document.getElementById('register-modal').classList.remove('hidden');
        }

        function closeRegisterModal() {
            document.getElementById('register-modal').classList.add('hidden');
        }

        function showChangePasswordModal() {
            document.getElementById('change-password-modal').classList.remove('hidden');
        }

        function closeChangePasswordModal() {
            document.getElementById('change-password-modal').classList.add('hidden');
        }

        async function handleChangePassword() {
            const username = document.getElementById('change-username').value.trim();
            const oldPwd = document.getElementById('old-password').value.trim();
            const newPwd = document.getElementById('new-password').value.trim();
            const confirmPwd = document.getElementById('confirm-password').value.trim();

            if (!username || !oldPwd || !newPwd || !confirmPwd) return alert('请填写完整信息');
            if (newPwd !== confirmPwd) return alert('两次输入的新密码不一致');

            try {
                const res = await fetch(ALL_DATA_URL);
                const result = await res.json();
                const submissions = result.submissions || [];
                
                // 验证原账号和原密码
                const userRecord = submissions.find(r =&gt; r.username === username &amp;&amp; r.password === oldPwd);
                
                if (!userRecord) {
                    return alert('账号或原密码错误，验证失败');
                }

                // 提交新密码
                const postRes = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username, 
                        password: newPwd, 
                        level: userRecord.level || 1, 
                        score: userRecord.score || 0,
                        timestamp: Date.now(),
                        type: 'password_change'
                    })
                });

                if (postRes.ok) {
                    alert('密码修改成功！请使用新密码登录');
                    closeChangePasswordModal();
                }
            } catch (e) {
                alert('操作失败，请检查网络');
            }
        }

        // 排行榜逻辑
        async function loadLeaderboard() {
            const listEl = document.getElementById('leaderboard-list');
            try {
                const res = await fetch(ALL_DATA_URL);
                const result = await res.json();
                const submissions = result.submissions || [];
                
                // 按用户名分组，取每个用户的最高分数
                const userBest = {};
                submissions.forEach(s =&gt; {
                    const lvl = parseInt(s.level) || 1;
                    const score = s.score !== undefined ? parseFloat(s.score) : (lvl - 1) * 10;
                    const time = parseInt(s.totalTime) || 999999; // 默认极大值
                    
                    if (!userBest[s.username] || score &gt; userBest[s.username].score || (score === userBest[s.username].score &amp;&amp; time &lt; userBest[s.username].time)) {
                        userBest[s.username] = { level: lvl, score: score, time: time };
                    }
                });

                // 转换为数组并排序：分数降序，用时升序
                const sorted = Object.entries(userBest)
                    .map(([name, data]) =&gt; ({ name, ...data }))
                    .sort((a, b) =&gt; {
                        if (b.score !== a.score) return b.score - a.score;
                        return a.time - b.time;
                    })
                    .slice(0, 10);

                listEl.innerHTML = sorted.map((u, i) =&gt; `
                    &lt;div class=&quot;flex items-center justify-between p-3 bg-white rounded-xl border-b-2 border-blue-100&quot;&gt;
                        &lt;div class=&quot;flex items-center gap-3&quot;&gt;
                            &lt;span class=&quot;w-6 h-6 flex items-center justify-center rounded-full ${i &lt; 3 ? 'bg-yellow-400 text-white' : 'bg-gray-100 text-gray-500'} text-xs font-bold&quot;&gt;
                                ${i + 1}
                            &lt;/span&gt;
                            &lt;span class=&quot;font-medium text-gray-700&quot;&gt;${u.name}&lt;/span&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;text-right&quot;&gt;
                            &lt;div class=&quot;text-blue-600 font-bold&quot;&gt;${u.score.toFixed(1)} 分&lt;/div&gt;
                            &lt;div class=&quot;text-xs text-gray-400&quot;&gt;用时: ${u.time}s&lt;/div&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                `).join('');
            } catch (e) {
                listEl.innerHTML = '&lt;p class=&quot;text-red-400 text-center py-4&quot;&gt;加载失败&lt;/p&gt;';
            }
        }

        // 初始加载排行榜
        loadLeaderboard();

        // 认证逻辑
        async function handleAuth(type) {
            const authMsg = document.getElementById('auth-msg');
            
            if (type === 'register') {
                const username = document.getElementById('reg-username').value.trim();
                const password = document.getElementById('reg-password').value.trim();
                
                if (!username || !password) return alert('请填写完整的注册信息');
                
                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            username, 
                            password, 
                            level: 1, 
                            timestamp: Date.now(),
                            type: 'user_registration'
                        })
                    });
                    if (res.ok) {
                        alert('注册成功！现在可以使用该账号登录了');
                        closeRegisterModal();
                        document.getElementById('login-username').value = username;
                    }
                } catch (e) {
                    alert('注册请求失败，请检查网络');
                }
            } else {
                const username = document.getElementById('login-username').value.trim();
                const password = document.getElementById('login-password').value.trim();
                
                if (!username || !password) return alert('请输入用户名和密码');
                
                authMsg.innerText = '正在验证并加载进度...';

                try {
                    const res = await fetch(ALL_DATA_URL);
                    const result = await res.json();
                    
                    // 适配后台返回的数据结构：数据在 result.submissions 中
                    const submissions = result.submissions || [];
                    
                    // 验证逻辑：查找用户名和密码匹配的最新记录
                    const userRecords = submissions.filter(r =&gt; r.username === username &amp;&amp; r.password === password)
                                                 .sort((a, b) =&gt; b.timestamp - a.timestamp);
                    
                    if (userRecords.length === 0) {
                        // 尝试只匹配用户名看是否存在（用于提示密码错误）
                        const userExists = submissions.some(r =&gt; r.username === username);
                        authMsg.innerText = userExists ? '密码错误，请重试' : '用户不存在，请先注册';
                        return;
                    }
                    
                    state.user = username;
                    state.password = password;
                    state.level = parseInt(userRecords[0].level) || 1;
                    state.totalTime = parseInt(userRecords[0].totalTime) || 0; // 加载总用时
                    
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('game-screen').classList.remove('hidden');
                    initLevel();
                } catch (e) {
                    authMsg.innerText = '登录失败，请重试';
                }
            }
        }

        // 保存进度
        async function saveProgress() {
            if (!state.user) return;
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '保存中...';
            
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: state.user, 
                        password: state.password, 
                        level: state.level, 
                        score: state.score, 
                        totalTime: state.totalTime, // 保存累计总用时
                        timestamp: Date.now(),
                        type: 'progress_save'
                    })
                });
                alert('进度已保存！下次登录将从第 ' + state.level + ' 关开始。');
                loadLeaderboard(); // 保存后刷新排行榜
            } catch (e) {
                alert('保存失败');
            } finally {
                btn.innerText = originalText;
            }
        }

        // 初始化关卡
        function initLevel() {
            state.questionIdx = 0;
            state.timer = 0;
            state.questions = [];
            state.currentLevelScore = 10; // 每关初始10分
            
            let numQuestions = state.level; // 第1关1题...第10关10题
            
            if (state.level &lt; 10) {
                for (let i = 1; i &lt;= numQuestions; i++) {
                    state.questions.push({
                        q: `${state.level} &times; ${i}`,
                        a: state.level * i
                    });
                }
            } else {
                for (let i = 0; i &lt; 10; i++) {
                    const m1 = Math.floor(Math.random() * 9) + 1;
                    const m2 = Math.floor(Math.random() * 9) + 1;
                    state.questions.push({
                        q: `${m1} &times; ${m2}`,
                        a: m1 * m2
                    });
                }
            }
            
            state.questions.sort(() =&gt; Math.random() - 0.5);
            
            updateUI();
            startTimer();
            showQuestion();
        }

        function startTimer() {
            clearInterval(state.timerInterval);
            state.timerInterval = setInterval(() =&gt; {
                state.timer++;
                document.getElementById('timer').innerText = state.timer;
            }, 1000);
        }

        function showQuestion() {
            state.isAnswering = false;
            const q = state.questions[state.questionIdx];
            document.getElementById('question-text').innerText = q.q + ' = ?';
            document.getElementById('feedback').innerText = '';
            
            // 生成选项
            const options = [q.a];
            while (options.length &lt; 4) {
                const wrong = Math.floor(Math.random() * 81) + 1;
                if (!options.includes(wrong)) options.push(wrong);
            }
            options.sort(() =&gt; Math.random() - 0.5);

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            options.forEach(opt =&gt; {
                const btn = document.createElement('button');
                btn.className = 'bg-white border-2 border-blue-200 py-4 rounded-xl text-2xl font-bold hover:bg-blue-50 transition';
                btn.innerText = opt;
                btn.onclick = () =&gt; checkAnswer(opt, btn);
                container.appendChild(btn);
            });

            // 更新进度条
            const progress = (state.questionIdx / state.questions.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
        }

        function checkAnswer(val, btn) {
            if (state.isAnswering) return;
            state.isAnswering = true;
            
            const correct = state.questions[state.questionIdx].a;
            const feedback = document.getElementById('feedback');

            if (val === correct) {
                btn.classList.add('correct-answer');
                feedback.innerText = '太棒了！正确！';
                feedback.className = 'h-8 text-center font-bold text-xl text-green-500';
                playSound(880);
                
                setTimeout(() =&gt; {
                    state.questionIdx++;
                    if (state.questionIdx &gt;= state.questions.length) {
                        completeLevel();
                    } else {
                        showQuestion();
                    }
                }, 800);
            } else {
                btn.classList.add('wrong-answer');
                feedback.innerText = '答错了，继续加油！';
                feedback.className = 'h-8 text-center font-bold text-xl text-red-500';
                playSound(220, 'square');
                
                // 扣分逻辑：10分 / 总题数
                const penalty = 10 / state.questions.length;
                state.currentLevelScore = Math.max(0, state.currentLevelScore - penalty);
                
                // 自动进入下一题，不等待用户确认
                setTimeout(() =&gt; {
                    state.questionIdx++;
                    if (state.questionIdx &gt;= state.questions.length) {
                        completeLevel();
                    } else {
                        showQuestion();
                    }
                }, 800);
            }
        }

        function completeLevel() {
            clearInterval(state.timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-level').innerText = '第 ' + state.level + ' 关';
            
            // 累计总用时
            state.totalTime += state.timer;
            
            // 累计总分：前几关已得总分 + 本关得分（保留1位小数）
            const earned = parseFloat(state.currentLevelScore.toFixed(1));
            state.score = (state.level - 1) * 10 + earned;
            
            if (state.level &gt;= 10) {
                document.getElementById('next-btn').innerText = '完美通关！重新挑战';
                document.getElementById('next-btn').onclick = restartGame;
            } else {
                document.getElementById('next-btn').innerText = '进入下一关';
                document.getElementById('next-btn').onclick = nextLevel;
            }
        }

        function nextLevel() {
            state.level++;
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            initLevel();
        }

        function restartGame() {
            state.level = 1;
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            initLevel();
        }

        function updateUI() {
            document.getElementById('current-level').innerText = state.level;
        }
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**

     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
</body>

</html>
